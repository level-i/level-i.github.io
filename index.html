<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LEVEL AI - Orbital Office 360</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* PANTALLA DE ACCESO BLINDADA */
        #pantalla-bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #020617; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-family: 'Montserrat', sans-serif; color: white; text-align: center;
        }
        .btn-entrar {
            background: linear-gradient(135deg, #00f2fe, #4f46e5); color: white; border: none; 
            padding: 20px 50px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; 
            cursor: pointer; box-shadow: 0 0 30px rgba(0,242,254,0.5); text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-entrar:hover { transform: scale(1.05); }

        /* PARCHE DE COMPATIBILIDAD MÓVIL: Forzar al contenedor a respetar el render */
        .a-canvas {
            position: absolute !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
        }
    </style>
</head>
<body>

    <div id="pantalla-bloqueo">
        <h1 style="letter-spacing: 3px; font-size: 2.2rem; margin-bottom: 5px; font-family: 'Orbitron';">LEVEL AI</h1>
        <p style="color: #00f2fe; letter-spacing: 2px; margin-bottom: 40px; font-size: 0.85rem; font-weight: 600;">ORBITAL OFFICE CLIENT EXPERIENCE</p>
        <button class="btn-entrar" onclick="arrancarEntornoVR()">
            Entrar en la Experiencia VR
        </button>
    </div>

    <a-scene style="display: none;" id="escena-vr" embedded="false" loading-screen="enabled: false">
        
        <a-assets>
            <video id="video-tiktok" src="https://level-i.github.io/level-intro.mp4" loop muted playsinline crossorigin="anonymous"></video>
        </a-assets>

        <a-sky color="#020617"></a-sky>
        <a-cylinder radius="30" height="15" material="src: https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=70; side: double; opacity: 0.3; brightness: 0.4;" position="0 0 0"></a-cylinder>
        <a-grid material="color: #1e293b; opacity: 0.2;" rotation="90 0 0" position="0 -0.05 0"></a-grid>

        <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
        <a-light type="directional" color="#00f2fe" intensity="0.6" position="-1 3 1"></a-light>

        <a-entity camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true;" position="0 1.6 0">
            <a-entity cursor="fuse: false; rayOrigin: mouse;"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.022"
                      material="color: #00f2fe; shader: flat"
                      raycaster="objects: .clickable">
            </a-entity>
        </a-entity>

        <a-entity position="0 1.5 -2.3">
            
            <a-entity id="holograma-susana" position="-0.45 0 0">
                <a-cone color="#00f2fe" radius-bottom="0.2" radius-top="0.04" height="1.1" material="opacity: 0.4; transparent: true; wireframe: true;"></a-cone>
                <a-sphere color="#00f2fe" radius="0.1" position="0 0.65 0" material="opacity: 0.6; transparent: true; wireframe: true;"></a-sphere>
                <a-ring color="#ff007f" radius-inner="0.11" radius-outer="0.12" position="0 0.65 0" rotation="0 90 0" material="opacity: 0.8; shader: flat;"></a-ring>
                <a-cylinder color="#ff007f" radius="0.01" height="0.08" position="0.08 0.58 0.08" rotation="45 45 0" material="shader: flat;"></a-cylinder>
                <a-cylinder color="#00f2fe" radius="0.3" height="0.02" position="0 -0.55 0" material="opacity: 0.3; transparent: true;"></a-cylinder>
            </a-entity>

            <a-text value="SUSANA ADVISOR" align="center" position="0 1.1 0" scale="0.9 0.9 0.9" font="exo2bold" color="#00f2fe"></a-text>
            <a-text id="texto-estado-vr" value="IA READY" align="center" position="0 0.85 0" scale="0.6 0.6 0.6" font="monoid" color="#fff"></a-text>

            <a-video src="#video-tiktok" width="0.8" height="1.4" position="0.6 0.1 0" material="opacity: 0.95; shader: flat; side: double;"></a-video>
            <a-plane color="#ffffff" width="0.84" height="1.44" position="0.6 0.1 -0.01" material="opacity: 0.1; transparent: true;"></a-plane>
        </a-entity>

        <a-entity position="-1.9 1.5 -1.6" rotation="0 35 0">
            <a-plane class="clickable" onclick="navegarMódulo(1)" position="0 0.5 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="1) COMPRAR O INVERTIR" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(2)" position="0 0.05 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="2) VENDER PROPIEDAD" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(3)" position="0 -0.4 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="3) HIPOTECA PRE-APROBADA" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(4)" position="0 -0.85 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="4) TRÁMITES CATASTRO" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="1.9 1.5 -1.6" rotation="0 -35 0">
            <a-plane class="clickable" onclick="navegarMódulo(5)" position="0 0.5 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="5) SER ADVISOR EXCLUSIVO" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(6)" position="0 0.05 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="6) ADMINISTRACIÓN" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(7)" position="0 -0.4 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="7) ENGLISH SPEAKER" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(8)" position="0 -0.85 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="8) PARLE FRANÇAISE" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
        </a-entity>

    </a-scene>

    <script>
        const welcomeMsg = "Hola. Te encuentras en una web profesional de servicios de consultoría inmobiliaria y marketing digital, dirigida por el API colegiado número 4351 de Barcelona. Soy Susana, tu Asistente Advisor con ADN LEVEL AI. Nos alegramos de tu visita. ¿En qué te podemos ayudar?";

        let iaActiva = false;

        // Oído de Susana
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        recognition.interimResults = false;

        function hablarSusana(texto, callback) {
            window.speechSynthesis.cancel();
            const ssu = new SpeechSynthesisUtterance(texto);
            const voces = window.speechSynthesis.getVoices();
            
            let vozFemenina = voces.find(v => v.lang.includes('es') && (v.name.includes('Monica') || v.name.includes('Google') || v.name.includes('Helena')));
            if (vozFemenina) ssu.voice = vozFemenina;
            
            ssu.rate = 0.95; ssu.pitch = 1.05;
            ssu.onend = () => { if (callback) callback(); };
            window.speechSynthesis.speak(ssu);
        }

        function abrirMicrofonoCliente() {
            document.getElementById('texto-estado-vr').setAttribute('value', 'ESCUCHANDO AL CLIENTE...');
            try { recognition.start(); } catch(e) {}
        }

        recognition.onresult = function(event) {
            const comando = event.results[0][0].transcript.toLowerCase();
            document.getElementById('texto-estado-vr').setAttribute('value', 'PROCESANDO...');
            
            if (comando.includes('comprar') || comando.includes('uno')) navegarMódulo(1);
            else if (comando.includes('vender') || comando.includes('dos')) navegarMódulo(2);
            else if (comando.includes('hipoteca') || comando.includes('tres')) navegarMódulo(3);
            else if (comando.includes('catastro') || comando.includes('cuatro')) navegarMódulo(4);
            else if (comando.includes('advisor') || comando.includes('cinco')) navegarMódulo(5);
            else if (comando.includes('administración') || comando.includes('seis')) navegarMódulo(6);
            else if (comando.includes('english') || comando.includes('siete')) navegarMódulo(7);
            else if (comando.includes('français') || comando.includes('ocho')) navegarMódulo(8);
            else {
                hablarSusana("Disculpa, no te he oído bien. ¿Me repites la opción?", abrirMicrofonoCliente);
            }
        };

        recognition.onerror = () => { document.getElementById('texto-estado-vr').setAttribute('value', 'IA READY - ELIGE'); };

        // CONFIGURACIÓN DE ARRANQUE COMPATIBLE (MÓVIL Y PC)
        function arrancarEntornoVR() {
            document.getElementById('pantalla-bloqueo').style.display = 'none';
            document.getElementById('escena-vr').style.display = 'block';
            iaActiva = true;

            // Vídeo de fondo al 10%
            const video = document.getElementById('video-tiktok');
            video.muted = false;
            video.volume = 0.1;
            
            // Garantizar arranque de vídeo tras interacción en móvil
            let vPromise = video.play();
            if (vPromise !== undefined) {
                vPromise.catch(error => { console.log("Interacción requerida para vídeo móvil"); });
            }

            document.getElementById('texto-estado-vr').setAttribute('value', 'SUSANA HABLANDO...');
            hablarSusana(welcomeMsg, abrirMicrofonoCliente);
        }

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
