<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL IMMO | Centro de Control</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <a-scene cursor="rayOrigin: mouse">
        <a-assets>
            <img id="mar" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=2000&q=80">
            <img id="ads" src="https://images.unsplash.com/photo-1533750349088-cd871a92f312?auto=format&fit=crop&w=2000&q=80">
        </a-assets>

        <a-sky src="#mar" phi-length="180" rotation="0 90 0"></a-sky>
        <a-sky src="#ads" phi-length="180" rotation="0 -90 0"></a-sky>

        <a-entity camera look-controls position="0 1.6 0">
            <a-cursor color="#00d2ff"></a-cursor>
        </a-entity>

        <a-text value="LEVEL IMMO | CENTRO DE CONTROL" align="center" position="0 2.5 -3" scale="1 1 1" color="#00d2ff"></a-text>

        <a-entity position="0 1.8 -3">
            <a-box position="-1.2 0 0" width="1" height="0.3" depth="0.05" color="#333"><a-text value="COMPRAR" align="center" position="0 0 0.03" scale="0.25 0.25 0.25"></a-text></a-box>
            <a-box position="0 0 0" width="1" height="0.3" depth="0.05" color="#333"><a-text value="VENDER" align="center" position="0 0 0.03" scale="0.25 0.25 0.25"></a-text></a-box>
            <a-box position="1.2 0 0" width="1" height="0.3" depth="0.05" color="#333"><a-text value="HIPOTECAS" align="center" position="0 0 0.03" scale="0.25 0.25 0.25"></a-text></a-box>
        </a-entity>

        <a-entity position="0 1.2 -3">
            <a-box position="-1.2 0 0" width="1" height="0.3" depth="0.05" color="#00d2ff"><a-text value="PISO RAPITA" align="center" position="0 0 0.03" scale="0.25 0.25 0.25"></a-text></a-box>
            <a-box position="0 0 0" width="1" height="0.3" depth="0.05" color="#00d2ff"><a-text value="CHALET" align="center" position="0 0 0.03" scale="0.25 0.25 0.25"></a-text></a-box>
            <a-box position="1.2 0 0" width="1" height="0.3" depth="0.05" color="#00d2ff"><a-text value="L'OASIS" align="center" position="0 0 0.03" scale="0.25 0.25 0.25"></a-text></a-box>
        </a-entity>
    </a-scene>
</body>
</html>
