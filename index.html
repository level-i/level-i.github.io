<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL AI - Pantalla Cero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. ENTORNO VIRTUAL CON VÍDEO DE FONDO PROPIO */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #020617;
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Vídeo corporativo estirado desde tu propio servidor de GitHub */
        #video-fondo {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -2;
            filter: brightness(0.25) contrast(1.1); /* Ajuste de brillo para que destaquen los diamantes */
            object-fit: cover;
        }

        /* Capa de fusión espacial para dar profundidad */
        .capa-espacial {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0;
            background: radial-gradient(circle at center, rgba(0, 242, 254, 0.15) 0%, rgba(2, 6, 23, 0.7) 80%);
            z-index: -1;
        }

        /* 2. DISEÑO ESTRUCTURAL DE PANTALLA CERO */
        #pantalla-cero {
            display: grid;
            grid-template-columns: 320px 1fr 380px;
            gap: 20px;
            padding: 30px;
            height: 90vh;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .columna-izquierda, .columna-derecha {
            display: flex;
            flex-direction: column;
            gap: 25px;
            justify-content: center;
        }

        /* 3. BOTONES CRISTAL DIAMANTE */
        .btn-diamante {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            clip-path: polygon(8% 0%, 92% 0%, 100% 50%, 92% 100%, 8% 100%, 0% 50%);
        }

        .btn-diamante:hover {
            background: rgba(0, 242, 254, 0.2);
            border-color: #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            transform: scale(1.02);
        }

        /* 4. SILUETA HOLOGRÁFICA (YODA STYLE) */
        .susana-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .holograma-yoda {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.25) 0%, transparent 70%);
            border: 2px dashed rgba(0, 242, 254, 0.35);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: flotarYoda 4s ease-in-out infinite;
            margin-bottom: 25px;
            cursor: pointer;
            box-shadow: inset 0 0 30px rgba(0, 242, 254, 0.15);
        }

        /* Silueta mística interior */
        .holograma-yoda::before {
            content: '';
            width: 110px;
            height: 160px;
            background: rgba(0, 242, 254, 0.65);
            clip-path: polygon(50% 0%, 20% 40%, 35% 40%, 15% 100%, 85% 100%, 65% 40%, 80% 40%);
            filter: blur(1px);
            box-shadow: 0 0 25px #00f2fe;
        }

        /* Pulsador visual de activación */
        .btn-activar-voz {
            position: absolute;
            background: #00f2fe;
            color: #020617;
            border: none;
            padding: 8px 15px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            border-radius: 20px;
            text-transform: uppercase;
            bottom: -10px;
            box-shadow: 0 0 15px #00f2fe;
            letter-spacing: 1px;
            animation: pulsoBoton 2s infinite;
        }

        #status-text {
            color: #00f2fe;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px #00f2fe;
            margin-top: 15px;
        }

        /* 5. PLAYLIST DE YOUTUBE lateral */
        .panel-videos {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 380px;
            overflow-y: auto;
        }

        iframe {
            width: 100%;
            height: 110px;
            border-radius: 6px;
            border: 1px solid rgba(0, 242, 254, 0.1);
        }

        /* ANIMACIONES */
        @keyframes flotarYoda {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulsoBoton {
            0%, 100% { transform: scale(1); box-shadow: 0 0 15px #00f2fe; }
            50% { transform: scale(1.05); box-shadow: 0 0 25px #00f2fe; }
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="video-fondo">
        <source src="https://level-i.github.io/level-intro.mp4"
