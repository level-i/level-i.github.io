<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL IMMO | Spatial Hub 10</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .interactive">
        <a-assets>
            <img id="office" src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000" crossorigin="anonymous">
        </a-assets>
        <a-sky src="#office" rotation="0 -90 0"></a-sky>

        <a-camera position="0 1.6 0"><a-cursor color="#fff"></a-cursor></a-camera>

        <a-text value="LEVEL.IMMO" align="center" position="0 2.5 -2.5" scale="1.5 1.5 1.5"></a-text>
        <a-text value="SPATIAL INMOBILIARIA" align="center" position="0 2.1 -2.5" scale="0.5 0.5 0.5" color="#00d2ff"></a-text>

        <a-entity position="0 1.3 -2" 
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            <a-icosahedron radius="0.4" color="#D4AF37" metalness="0.8" roughness="0.2"></a-icosahedron>
        </a-entity>

        <a-entity position="0 0.5 -2">
            <a-box class="interactive" position="-0.8 0 0" width="0.7" height="0.15" color="#000" opacity="0.8">
                <a-text value="COMPRAR" align="center" scale="0.2 0.2 0.2"></a-text>
            </a-box>
            <a-box class="interactive" position="0 0 0" width="0.7" height="0.15" color="#000" opacity="0.9">
                <a-text value="VENDER" align="center" scale="0.2 0.2 0.2" color="#ffffff" font="roboto"></a-text>
            </a-box>
            <a-box class="interactive" position="0.8 0 0" width="0.7" height="0.15" color="#000" opacity="0.8">
                <a-text value="HIPOTECAS" align="center" scale="0.2 0.2 0.2"></a-text>
            </a-box>
        </a-entity>

        <a-entity position="0 0.2 -2">
            <a-box class="interactive" position="-0.8 0 0" width="0.7" height="0.15" color="#00d2ff" opacity="0.5"><a-text value="PISO RAPITA" align="center" scale="0.15 0.15 0.15" color="#000"></a-text></a-box>
            <a-box class="interactive" position="0 0 0" width="0.7" height="0.15" color="#00d2ff" opacity="0.5"><a-text value="CHALET" align="center" scale="0.15 0.15 0.15" color="#000"></a-text></a-box>
            <a-box class="interactive" position="0.8 0 0" width="0.7" height="0.15" color="#00d2ff" opacity="0.5"><a-text value="L'OASIS" align="center" scale="0.15 0.15 0.15" color="#000"></a-text></a-box>
        </a-entity>
    </a-scene>
</body>
</html>
