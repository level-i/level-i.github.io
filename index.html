<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL IMMO | Spatial Hub</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .interactive">
        <a-assets>
            <img id="office" src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000" crossorigin="anonymous">
        </a-assets>
        <a-sky src="#office" rotation="0 -90 0"></a-sky>

        <a-camera position="0 1.6 0">
            <a-cursor color="#00d2ff"></a-cursor>
        </a-camera>

        <a-text value="LEVEL.IMMO" align="center" position="0 2.2 -2" scale="0.8 0.8 0.8" color="#ffffff"></a-text>

        <a-entity id="avatar-zone" position="0 1.4 -2">
            <a-ring color="#00d2ff" radius-inner="0.3" radius-outer="0.32" opacity="0.4"></a-ring>
            <a-text value="IA AGENT" align="center" position="0 -0.5 0" scale="0.15 0.15 0.15" color="#00d2ff"></a-text>
        </a-entity>

        <a-entity position="0 0.7 -2">
            <a-entity position="0 0.25 0">
                <a-plane class="interactive" position="-0.7 0 0" width="0.6" height="0.15" material="color: #fff; opacity: 0.1; transparent: true; side: double"><a-text value="COMPRAR" align="center" scale="0.15 0.15 0.15"></a-text></a-plane>
                <a-plane class="interactive" position="0 0 0" width="0.6" height="0.15" material="color: #fff; opacity: 0.1; transparent: true; side: double"><a-text value="VENDER" align="center" scale="0.15 0.15 0.15"></a-text></a-plane>
                <a-plane class="interactive" position="0.7 0 0" width="0.6" height="0.15" material="color: #fff; opacity: 0.1; transparent: true; side: double"><a-text value="HIPOTECAS" align="center" scale="0.15 0.15 0.15"></a-text></a-plane>
            </a-entity>
            
            <a-entity position="0 -0.05 0">
                <a-plane class="interactive" position="-0.7 0 0" width="0.6" height="0.15" material="color: #00d2ff; opacity: 0.15; transparent: true; side: double"><a-text value="PISO" align="center" scale="0.15 0.15 0.15" color="#00d2ff"></a-text></a-plane>
                <a-plane class="interactive" position="0 0 0" width="0.6" height="0.15" material="color: #00d2ff; opacity: 0.15; transparent: true; side: double"><a-text value="CHALET" align="center" scale="0.15 0.15 0.15" color="#00d2ff"></a-text></a-plane>
                <a-plane class="interactive" position="0.7 0 0" width="0.6" height="0.15" material="color: #00d2ff; opacity: 0.15; transparent: true; side: double"><a-text value="VILLA" align="center" scale="0.15 0.15 0.15" color="#00d2ff"></a-text></a-plane>
            </a-entity>
        </a-entity>
    </a-scene>
</body>
</html>
