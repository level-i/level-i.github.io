<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL IMMO | Spatial Hub 10.0</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .interactive">
        
        <a-assets>
            <img id="office" src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000" crossorigin="anonymous">
            <video id="video-corp" autoplay loop="true" src="level-intro.mp4" crossorigin="anonymous"></video>
        </a-assets>

        <a-sky src="#office" rotation="0 -90 0"></a-sky>

        <a-camera position="0 1.6 0">
            <a-cursor color="#00d2ff" scale="0.5 0.5 0.5"></a-cursor>
        </a-camera>

        <a-entity position="0 2.5 -3">
            <a-text value="LEVEL.IMMO" align="center" scale="1.8 1.8 1.8" color="#ffffff" font="mozillavr"></a-text>
            <a-text value="SPATIAL INMOBILIARIA" align="center" position="0 -0.4 0" scale="0.6 0.6 0.6" color="#00d2ff" letter-spacing="10"></a-text>
        </a-entity>

        <a-entity position="0 1.6 -2.5" class="interactive">
            <a-icosahedron radius="0.15" color="#D4AF37" metalness="0.9" roughness="0.1" 
                           animation="property: rotation; to: 0 360 360; loop: true; dur: 5000; easing: linear">
            </a-icosahedron>
            <a-text value="ADVISORS" align="center" position="0 -0.3 0" scale="0.3 0.3 0.3" color="#D4AF37"></a-text>
            <a-ring color="#D4AF37" radius-inner="0.18" radius-outer="0.19" rotation="90 0 0" opacity="0.5"></a-ring>
        </a-entity>

        <a-entity position="0 0.6 -2.2">
            <a-entity position="0 0.3 0">
                <a-box class="interactive" position="-0.8 0 0" width="0.7" height="0.15" depth="0.05" material="color: #000; opacity: 0.8">
                    <a-text value="COMPRAR" align="center" scale="0.2 0.2 0.2" color="#fff"></a-text>
                </a-box>
                <a-box class="interactive" position="0 0 0" width="0.7" height="0.15" depth="0.05" material="color: #000; opacity: 0.9">
                    <a-text value="VENDER" align="center" scale="0.2 0.2 0.2" color="#fff"></a-text>
                </a-box>
                <a-box class="interactive" position="0.8 0 0" width="0.7" height="0.15" depth="0.05" material="color: #000; opacity: 0.8">
                    <a-text value="HIPOTECAS" align="center" scale="0.2 0.2 0.2" color="#fff"></a-text>
                </a-box>
            </a-entity>

            <a-entity position="0 0 0">
                <a-box class="interactive" position="-0.8 0 0" width="0.7" height="0.15" depth="0.05" material="color: #00d2ff; opacity: 0.6"
                       onclick="window.open('https://www.youtube.com/watch?v=oTGUy0fR9i4', '_blank')">
                    <a-text value="PISO RAPITA" align="center" scale="0.15 0.15 0.15" color="#000"></a-text>
                </a-box>
                <a-box class="interactive" position="0 0 0" width="0.7" height="0.15" depth="0.05" material="color: #00d2ff; opacity: 0.6"
                       onclick="window.open('https://www.youtube.com/watch?v=9TTqR1wD3jI', '_blank')">
                    <a-text value="CHALET MODERNO" align="center" scale="0.15 0.15 0.15" color="#000"></a-text>
                </a-box>
                <a-box class="interactive" position="0.8 0 0" width="0.7" height="0.15" depth="0.05" material="color: #00d2ff; opacity: 0.6"
                       onclick="window.open('https://www.youtube.com/watch?v=WFv2xu42U40', '_blank')">
                    <a-text value="L'OASIS" align="center" scale="0.15 0.15 0.15" color="#000"></a-text>
                </a-box>
            </a-entity>
        </a-entity>

        <a-entity position="0 1.6 3.5" rotation="0 180 0">
            <a-plane width="4" height="2.2" color="#000" position="0 0 -0.01"></a-plane>
            <a-video src="#video-corp" width="3.8" height="2.1"></a-video>
            <a-text value="EXPERIENCIA CORPORATIVA LEVEL IMMO" align="center" position="0 -1.3 0" scale="0.6 0.6 0.6"></a-text>
        </a-entity>

        <a-light type="ambient" intensity="0.6"></a-light>
        <a-light type="point" position="0 3 -1" intensity="0.4" color="#00d2ff"></a-light>

    </a-scene>
</body>
</html>
