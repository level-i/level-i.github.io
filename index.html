<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL IMMO | Spatial Hub</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <a-scene cursor="rayOrigin: mouse">
        <a-assets>
            <img id="office" src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000" crossorigin="anonymous">
        </a-assets>
        <a-sky src="#office" rotation="0 -90 0"></a-sky>

        <a-camera position="0 1.6 0">
            <a-cursor color="#ffffff"></a-cursor>
        </a-camera>

        <a-entity position="0 2.2 -2">
            <a-text value="LEVEL.IMMO" align="center" scale="1.5 1.5 1.5" color="#ffffff" font="roboto"></a-text>
            <a-text value="SPATIAL INMOBILIARIA" align="center" position="0 -0.35 0" scale="0.6 0.6 0.6" color="#ffffff" letter-spacing="5"></a-text>
        </a-entity>

        <a-entity position="0 1.3 -2">
            <a-entity geometry="primitive: plane; width: 0.8; height: 0.5" material="color: #00d2ff; wireframe: true; wireframeLinewidth: 2" opacity="0.5"></a-entity>
            <a-text value="IA AGENT" align="center" position="0 -0.4 0" scale="0.2 0.2 0.2" color="#ffffff"></a-text>
        </a-entity>

        <a-entity position="0 0.6 -2">
            <a-entity position="0 0.2 0">
                <a-box class="interactive" position="-0.7 0 0" width="0.6" height="0.15" depth="0.02" color="#ffffff"><a-text value="COMPRAR" align="center" color="#000" scale="0.15 0.15 0.15"></a-text></a-box>
                <a-box class="interactive" position="0 0 0" width="0.6" height="0.15" depth="0.02" color="#ffffff"><a-text value="VENDER" align="center" color="#000" scale="0.15 0.15 0.15"></a-text></a-box>
                <a-box class="interactive" position="0.7 0 0" width="0.6" height="0.15" depth="0.02" color="#ffffff"><a-text value="HIPOTECAS" align="center" color="#000" scale="0.15 0.15 0.15"></a-text></a-box>
            </a-entity>
            
            <a-entity position="0 -0.1 0">
                <a-box class="interactive" position="-0.7 0 0" width="0.6" height="0.15" depth="0.02" color="#ffffff"><a-text value="PISO" align="center" color="#000" scale="0.15 0.15 0.15"></a-text></a-box>
                <a-box class="interactive" position="0 0 0" width="0.6" height="0.15" depth="0.02" color="#ffffff"><a-text value="CHALET" align="center" color="#000" scale="0.15 0.15 0.15"></a-text></a-box>
                <a-box class="interactive" position="0.7 0 0" width="0.6" height="0.15" depth="0.02" color="#ffffff"><a-text value="VILLA" align="center" color="#000" scale="0.15 0.15 0.15"></a-text></a-box>
            </a-entity>
        </a-entity>
    </a-scene>
</body>
</html>
