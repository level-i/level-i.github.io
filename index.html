<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL IMMO | Spatial Hub</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script>
        // Este pequeño script asegura que el video empiece a reproducirse en cuanto se toca la pantalla
        AFRAME.registerComponent('control-video', {
            init: function () {
                var videoEl = document.querySelector('#video-corp');
                this.el.addEventListener('click', function () {
                    if (videoEl) {
                        videoEl.play();
                    }
                });
            }
        });
    </script>
</head>
<body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .interactive">
        <a-assets>
            <img id="office" src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000" crossorigin="anonymous">
            
            <video id="video-corp" autoplay loop="true" src="video.mp4" crossorigin="anonymous" muted playsinline webkit-playsinline></video>
        </a-assets>

        <a-sky src="#office" rotation="0 -90 0"></a-sky>
        <a-camera position="0 1.6 0"><a-cursor color="#fff"></a-cursor></a-camera>

        <a-text value="LEVEL.IMMO" align="center" position="0 2.6 -2" scale="1.5 1.5 1.5" color="#fff" font="exo2bold"></a-text>

        <a-entity position="0 2.1 -2">
            <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
                <a-icosahedron radius="0.2" color="#FFCC00"></a-icosahedron>
            </a-entity>
            <a-plane position="0 -0.35 0" width="0.7" height="0.2" color="#000000" opacity="0.8">
                <a-text value="ADVISORS" align="center" scale="0.4 0.4 0.4" color="#FFCC00" font="exo2bold"></a-text>
            </a-plane>
        </a-entity>

        <a-entity id="avatar-container" position="0 1.2 -2" animation="property: position; to: 0 1.25 -2; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine">
            <a-entity id="avatar-placeholder" geometry="primitive: sphere; radius: 0.3" material="opacity: 0; transparent: true">
                <a-sphere radius="0.12" color="#00d2ff" material="emissive: #00d2ff; emissiveIntensity: 0.5" position="0 0.15 0" animation="property: material.emissiveIntensity; to: 1; dir: alternate; loop: true; dur: 1000"></a-sphere>
                <a-cylinder radius="0.06" height="0.3" color="#fff" material="opacity: 0.8; transparent: true"></a-cylinder>
                <a-text class="status-text" value="IA ACTIVA" align="center" position="0 -0.3 0" scale="0.3 0.3 0.3" color="#00d2ff" font="exo2bold"></a-text>
            </a-entity>
        </a-entity>

        <a-entity position="0 0.8 -2">
            <a-plane class="interactive" position="-0.8 0 0" width="0.7" height="0.2" color="#000" opacity="0.9"><a-text value="COMPRAR" align="center" scale="0.4 0.4 0.4" color="#fff" font="exo2bold"></a-text></a-plane>
            <a-plane class="interactive" position="0 0 0" width="0.7" height="0.2" color="#000" opacity="0.9"><a-text value="VENDER" align="center" scale="0.4 0.4 0.4" color="#fff" font="exo2bold"></a-text></a-plane>
            <a-plane class="interactive" position="0.8 0 0" width="0.7" height="0.2" color="#000" opacity="0.9"><a-text value="HIPOTECAS" align="center" scale="0.4 0.4 0.4" color="#fff" font="exo2bold"></a-text></a-plane>
        </a-entity>

        <a-entity position="0 0.5 -2">
            <a-plane class="interactive" position="-0.8 0 0" width="0.7" height="0.2" color="#000" opacity="0.9"><a-text value="PISO" align="center" scale="0.4 0.4 0.4" color="#40E0D0" font="exo2bold"></a-text></a-plane>
            <a-plane class="interactive" position="0 0 0" width="0.7" height="0.2" color="#000" opacity="0.9"><a-text value="CHALET" align="center" scale="0.4 0.4 0.4" color="#40E0D0" font="exo2bold"></a-text></a-plane>
            <a-plane class="interactive" position="0.8 0 0" width="0.7" height="0.2" color="#000" opacity="0.9"><a-text value="VILLA" align="center" scale="0.4 0.4 0.4" color="#40E0D0" font="exo2bold"></a-text></a-plane>
        </a-entity>

        <a-entity position="0 1.6 3.5" rotation="0 180 0" class="interactive" control-video>
            <a-plane width="4" height="2.25" color="#000" position="0 0 -0.01"></a-plane>
            <a-video src="#video-corp" width="3.8" height="2.15"></a-video>
        </a-entity>

    </a-scene>
</body>
</html>
