<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL AI - Orbital Office 360</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2 family=Montserrat:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. ENTORNO ENVOLVENTE 360: OFICINA PREMIUM DE CRISTAL */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #020617;
            /* Simulación visual de oficina acristalada flotando en el espacio */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 242, 254, 0.1) 0%, transparent 70%),
                linear-gradient(120deg, rgba(15, 23, 42, 0.95) 0%, rgba(2, 6, 23, 0.9) 100%);
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Líneas estructurales que emulan los paneles de cristal 360 de la oficina */
        body::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            border: 20px solid rgba(255, 255, 255, 0.02);
            background-image: 
                linear-gradient(to right, rgba(0, 242, 254, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
            background-size: 80px 80px;
            opacity: 0.8;
            z-index: -1;
        }

        /* 2. ARQUITECTURA DE LA PANTALLA CERO */
        #pantalla-cero {
            display: grid;
            grid-template-columns: 320px 1fr 350px;
            gap: 20px;
            padding: 30px;
            height: 90vh;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .columna-izquierda {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* AREA CENTRAL: AVATAR Y ESPEJO VERTICAL */
        .centro-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 50px;
        }

        .susana-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* EL PANEL ESPEJO VERTICAL (Diseño TikTok Premium) */
        .espejo-vertical {
            width: 240px;
            height: 420px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 
                        0 0 25px rgba(0, 242, 254, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .espejo-vertical:hover {
            border-color: #00f2fe;
            box-shadow: 0 15px 40px rgba(0, 242, 254, 0.3);
        }

        .espejo-vertical video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* SILUETA HOLOGRÁFICA YODA */
        .holograma-yoda {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.25) 0%, transparent 70%);
            border: 2px dashed rgba(0, 242, 254, 0.35);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: flotarYoda 4s ease-in-out infinite;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .holograma-yoda::before {
            content: '';
            width: 80px;
            height: 120px;
            background: rgba(0, 242, 254, 0.65);
            clip-path: polygon(50% 0%, 20% 40%, 35% 40%, 15% 100%, 85% 100%, 65% 40%, 80% 40%);
            filter: blur(1px);
            box-shadow: 0 0 20px #00f2fe;
        }

        .btn-activar-voz {
            position: absolute;
            background: #00f2fe;
            color: #020617;
            border: none;
            padding: 8px 15px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            border-radius: 20px;
            text-transform: uppercase;
            bottom: -10px;
            box-shadow: 0 0 15px #00f2fe;
            cursor: pointer;
        }

        /* 3. BOTONES CRISTAL DIAMANTE */
        .btn-diamante {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            clip-path: polygon(8% 0%, 92% 0%, 100% 50%, 92% 100%, 8% 100%, 0% 50%);
        }

        .btn-diamante:hover {
            background: rgba(0, 242, 254, 0.2);
            border-color: #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            transform: scale(1.02);
        }

        #status-text {
            color: #00f2fe;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px #00f2fe;
            margin-top: 10px;
        }

        /* LADO DERECHO: SUBMENÚS VERTICALES */
        .columna-derecha {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @keyframes flotarYoda {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

    <div id="pantalla-cero">
        
        <div class="columna-izquierda">
            <div class="btn-diamante" onclick="navegarMódulo(1)">1) Comprar o Invertir</div>
            <div class="btn-diamante" onclick="navegarMódulo(2)">2) Vender Propiedad</div>
            <div class="btn-diamante" onclick="navegarMódulo(3)">3) Hipoteca Pre-Aprobada</div>
            <div class="btn-diamante" onclick="navegarMódulo(4)">4) Trámites Catastro</div>
        </div>

        <div class="centro-container">
            <div class="susana-area">
                <div class="holograma-yoda" onclick="forzarVozSusana()">
                    <button class="btn-activar-voz" id="btn-holo">Activar IA</button>
                </div>
                <h2 style="font-family: 'Orbitron', sans-serif; font-size: 1.2rem; letter-spacing: 2px; margin: 0;">SUSANA ADVISOR</h2>
                <div id="status-text">INICIA EL ADVISOR</div>
            </div>

            <div class="espejo-vertical">
                <video id="video-tiktok" loop muted playsinline autoplay>
                    <source src="https://level-i.github.io/level-intro.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <div class="columna-derecha">
            <div class="btn-diamante" onclick="navegarMódulo(5)">5) Ser Advisor Exclusivo</div>
            <div class="btn-diamante" onclick="navegarMódulo(6)">6) Administración</div>
            <div class="btn-diamante" onclick="navegarMódulo(7)">7) English Speaker</div>
            <div class="btn-diamante" onclick="navegarMódulo(8)">8) Parle Françoise</div>
        </div>

    </div>

<script>
    const welcomeMsg = "Hola. Te encuentras en una web profesional de servicios de consultoría inmobiliaria y marketing digital, dirigida por el API colegiado número 4351 de Barcelona. Soy Susana, tu Asistente Advisor con ADN LEVEL AI. Nos alegramos de tu visita. ¿En qué te podemos ayudar?";

    let iaIniciada = false;

    // RECEPTOR DE AUDIO (El oído de Susana)
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.interimResults = false;

    function hablarSusana(texto, callback) {
        window.speechSynthesis.cancel();
        const ssu = new SpeechSynthesisUtterance(texto);
        const voces = window.speechSynthesis.getVoices();
        
        let vozFemenina = voces.find(v => v.lang.includes('es') && (v.name.includes('Monica') || v.name.includes('Google') || v.name.includes('Helena')));
        if (vozFemenina) ssu.voice = vozFemenina;
        
        ssu.rate = 0.95;
        ssu.pitch = 1.05;
        
        // Al terminar de hablar, Susana abre automáticamente el micrófono para escuchar al cliente
        ssu.onend = () => {
            if (callback) callback();
        };
        
        window.speechSynthesis.speak(ssu);
    }

    function escucharCliente() {
        document.getElementById('status-text').innerText = "ESCUCHANDO...";
        try {
            recognition.start();
        } catch(e) { console.log("Reconocimiento ya activo."); }
    }

    // Procesador de las respuestas por voz en Pantalla Cero
    recognition.onresult = function(event) {
        const respuesta = event.results[0][0].transcript.toLowerCase();
        document.getElementById('status-text').innerText = "PROCESANDO...";
        
        if (respuesta.includes('comprar') || respuesta.includes('invertir') || respuesta.includes('uno')) navegarMódulo(1);
        else if (respuesta.includes('vender') || respuesta.includes('dos')) navegarMódulo(2);
        else if (respuesta.includes('hipoteca') || respuesta.includes('tres')) navegarMódulo(3);
        else if (respuesta.includes('catastro') || respuesta.includes('cuatro')) navegarMódulo(4);
        else if (respuesta.includes('advisor') || respuesta.includes('cinco')) navegarMódulo(5);
        else if (respuesta.includes('administración') || respuesta.includes('administracion') || respuesta.includes('seis')) navegarMódulo(6);
        else if (respuesta.includes('english') || respuesta.includes('siete')) navegarMódulo(7);
        else if (respuesta.includes('français') || respuesta.includes('frances') || respuesta.includes('ocho')) navegarMódulo(8);
        else {
            hablarSusana("Disculpa, no te he entendido. ¿Me repites qué opción deseas?", escucharCliente);
        }
    };

    recognition.onerror = () => {
        document.getElementById('status-text').innerText = "IA READY";
    };

    // ACTUACIÓN INICIAL DEL BOTÓN DEL HOLOGRAMA
    function forzarVozSusana() {
        if (iaIniciada) return;
        iaIniciada = true;
        document.getElementById('status-text').innerText = "SUSANA HABLANDO...";
        document.getElementById('btn-holo').style.display = 'none';
        
        // Desenmudecemos el vídeo vertical del espejo al entrar
        const video = document.getElementById('video-tiktok');
        video.muted = false;
        video.play();
        
        // Susana habla y, al terminar, abre el micrófono por primera vez
        hablarSusana(welcomeMsg, escucharCliente);
    }

    function navegarMódulo(id) {
        if (!iaIniciada) {
            forzarVozSusana();
            return;
        }
        console.log("Accediendo al módulo " + id);
        document.getElementById('status-text').innerText = "MÓDULO " + id + "...";
        hablarSusana("Entendido. Accediendo al submódulo número " + id + ". Por favor, espera un momento.");
        
        // Aquí es donde en los siguientes pasos conectaremos la carga de los scripts 11-19, 21-29, etc.
    }

    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
</script>

</body>
</html>
