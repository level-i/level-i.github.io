<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL IMMO | HQ Futurista</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
</head>
<body>

    <a-scene renderer="antialias: true; colorManagement: true;" cursor="rayOrigin: mouse" raycaster="objects: .interactive">
        
        <a-assets>
            <img id="office" src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000" crossorigin="anonymous">
            <img id="crystal" src="https://img.freepik.com/free-photo/abstract-luxury-gradient-blue-background-smooth-dark-blue-with-black-vignette-studio-banner_1258-63452.jpg" crossorigin="anonymous">
        </a-assets>

        <a-sky src="#office" rotation="0 -90 0"></a-sky>
        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="point" position="0 5 -2" intensity="1" color="#00d2ff"></a-light>

        <a-entity id="rig" position="0 0 0">
            <a-camera look-controls wasd-controls position="0 1.6 0">
                <a-cursor color="#00d2ff" fuse="false"></a-cursor>
            </a-camera>
            <a-entity laser-controls="hand: left"></a-entity>
            <a-entity laser-controls="hand: right"></a-entity>
        </a-entity>

        <a-text value="LEVEL.IMMO SPATIAL HUB" align="center" position="0 2.6 -2" scale="0.7 0.7 0.7" color="#00d2ff" font="exo2bold"></a-text>

        <a-entity id="main-panel" position="0 1.4 -2">
            
            <a-entity id="btn-advisors" position="0 0.7 0" class="interactive">
                <a-ring color="#FFD700" radius-inner="0.52" radius-outer="0.55" position="0 0 -0.01"
                        animation="property: rotation; to: 0 0 360; loop: true; dur: 3000; easing: linear"
                        animation__pulse="property: opacity; from: 0.3; to: 1; dir: alternate; loop: true; dur: 1000">
                </a-ring>
                <a-box width="1" height="0.35" depth="0.1" material="color: #6d5a19; metalness: 0.8; roughness: 0.2; emissive: #40340f"
                       event-set__mouseenter="material.emissive: #967d26; scale: 1.05 1.05 1.05"
                       event-set__mouseleave="material.emissive: #40340f; scale: 1 1 1">
                    <a-text value="ADVISORS" align="center" position="0 0 0.06" scale="0.3 0.3 0.3" color="#FFD700"></a-text>
                </a-box>
            </a-entity>

            <a-entity position="0 0.3 0">
                <a-box class="interactive" position="-1.1 0 0" width="0.9" height="0.3" depth="0.08" 
                       material="src: #crystal; opacity: 0.7; transparent: true; metalness: 0.9; roughness: 0.1"
                       event-set__mouseenter="material.opacity: 1; scale: 1.1 1.1 1.1"
                       event-set__mouseleave="material.opacity: 0.7; scale: 1 1 1">
                    <a-text value="COMPRAR" align="center" position="0 0 0.05" scale="0.25 0.25 0.25"></a-text>
                </a-box>
                <a-box class="interactive" position="0 0 0" width="0.9" height="0.3" depth="0.08" 
                       material="src: #crystal; opacity: 0.7; transparent: true; metalness: 0.9; roughness: 0.1">
                    <a-text value="VENDER" align="center" position="0 0 0.05" scale="0.25 0.25 0.25"></a-text>
                </a-box>
                <a-box class="interactive" position="1.1 0 0" width="0.9" height="0.3" depth="0.08" 
                       material="src: #crystal; opacity: 0.7; transparent: true; metalness: 0.9; roughness: 0.1">
                    <a-text value="HIPOTECAS" align="center" position="0 0 0.05" scale="0.25 0.25 0.25"></a-text>
                </a-box>
            </a-entity>

            <a-entity position="0 -0.15 0">
                <a-box class="interactive" position="-1.1 0 0" width="0.9" height="0.3" depth="0.08" 
                       material="color: #00d2ff; opacity: 0.6; transparent: true; emissive: #00d2ff; emissiveIntensity: 0.5"
                       onclick="window.open('https://www.youtube.com/watch?v=oTGUy0fR9i4', '_blank')">
                    <a-text value="PISO RAPITA" align="center" position="0 0 0.05" scale="0.22 0.22 0.22" color="#000"></a-text>
                </a-box>
                <a-box class="interactive" position="0 0 0" width="0.9" height="0.3" depth="0.08" 
                       material="color: #00d2ff; opacity: 0.6; transparent: true; emissive: #00d2ff; emissiveIntensity: 0.5"
                       onclick="window.open('https://www.youtube.com/watch?v=9TTqR1wD3jI', '_blank')">
                    <a-text value="CHALET MODERNO" align="center" position="0 0 0.05" scale="0.22 0.22 0.22" color="#000"></a-text>
                </a-box>
                <a-box class="interactive" position="1.1 0 0" width="0.9" height="0.3" depth="0.08" 
                       material="color: #00d2ff; opacity: 0.6; transparent: true; emissive: #00d2ff; emissiveIntensity: 0.5"
                       onclick="window.open('https://www.youtube.com/watch?v=WFv2xu42U40', '_blank')">
                    <a-text value="L'OASIS" align="center" position="0 0 0.05" scale="0.22 0.22 0.22" color="#000"></a-text>
                </a-box>
            </a-entity>

        </a-entity>

        <a-entity line="start: 0 -1 0; end: 0 -1 -50; color: #00d2ff" opacity="0.5"></a-entity>
        <a-light type="spot" color="#00d2ff" position="0 4 -2" target="#main-panel" intensity="0.5"></a-light>

    </a-scene>
</body>
</html>
