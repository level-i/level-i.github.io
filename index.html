<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL IMMO | Spatial Hub Pro</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .interactive">
        <a-assets>
            <img id="office" src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000" crossorigin="anonymous">
            <img id="screen-placeholder" src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=1000" crossorigin="anonymous">
        </a-assets>

        <a-sky src="#office" rotation="0 -90 0"></a-sky>

        <a-camera position="0 1.6 0"><a-cursor color="#fff"></a-cursor></a-camera>

        <a-text value="LEVEL.IMMO" align="center" position="0 2.5 -2.5" scale="1 1 1" color="#fff"></a-text>

        <a-entity position="0 1.2 -2">
            <a-entity id="btn-advisors" position="0 0.6 0" class="interactive">
                <a-ring color="#D4AF37" radius-inner="0.35" radius-outer="0.37" animation="property: rotation; to: 0 0 360; dur: 5000; loop: true; easing: linear"></a-ring>
                <a-box width="0.7" height="0.2" depth="0.02" color="#332808"><a-text value="ADVISORS" align="center" color="#D4AF37" scale="0.2 0.2 0.2"></a-text></a-box>
            </a-entity>

            <a-entity position="0 0 0">
                <a-box class="interactive" position="-0.8 0 0" width="0.7" height="0.15" color="#000"><a-text value="COMPRAR" align="center" scale="0.15 0.15 0.15"></a-text></a-box>
                <a-box class="interactive" position="0 0 0" width="0.7" height="0.15" color="#000"><a-text value="VENDER" align="center" scale="0.15 0.15 0.15"></a-text></a-box>
                <a-box class="interactive" position="0.8 0 0" width="0.7" height="0.15" color="#000"><a-text value="HIPOTECAS" align="center" scale="0.15 0.15 0.15"></a-text></a-box>
            </a-entity>

            <a-entity position="0 -0.2 0">
                <a-box class="interactive" position="-0.8 0 0" width="0.7" height="0.15" color="#00d2ff"><a-text value="PISO RAPITA" align="center" color="#000" scale="0.13 0.13 0.13"></a-text></a-box>
                <a-box class="interactive" position="0 0 0" width="0.7" height="0.15" color="#00d2ff"><a-text value="CHALET" align="center" color="#000" scale="0.13 0.13 0.13"></a-text></a-box>
                <a-box class="interactive" position="0.8 0 0" width="0.7" height="0.15" color="#00d2ff"><a-text value="L'OASIS" align="center" color="#000" scale="0.13 0.13 0.13"></a-text></a-box>
            </a-entity>
        </a-entity>

        <a-entity position="0 1.6 3" rotation="0 180 0">
            <a-plane width="4" height="2.2" src="#screen-placeholder" material="shader: flat"></a-plane>
            <a-text value="VISUALIZACIÓN INMOBILIARIA" align="center" position="0 -1.3 0" scale="0.8 0.8 0.8"></a-text>
        </a-entity>
    </a-scene>
</body>
</html>
