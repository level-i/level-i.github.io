<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LEVEL-i - Orbital Office 360</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* PANTALLA DE ACCESO PROFESIONAL */
        #pantalla-bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #020617; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-family: 'Montserrat', sans-serif; color: white; text-align: center;
        }
        .btn-entrar {
            background: linear-gradient(135deg, #00f2fe, #4f46e5); color: white; border: none; 
            padding: 20px 50px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; 
            cursor: pointer; box-shadow: 0 0 30px rgba(0,242,254,0.5); text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-entrar:hover { transform: scale(1.02); }
        .a-canvas {
            position: absolute !important; top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
        }
        /* BOTÓN PRIVACIDAD HTML (PANTALLA INICIAL) */
        .btn-privacidad-html {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: #94a3b8; text-decoration: none; font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem; letter-spacing: 1px; transition: 0.3s; z-index: 10000;
        }
        .btn-privacidad-html:hover { color: #00f2fe; }
    </style>

    <script>
        // REGISTRO DEL COMPONENTE INTERACTIVO MULTIPLATAFORMA NATIVO DE A-FRAME
        AFRAME.registerComponent('componente-enlace-vr', {
            init: function () {
                var el = this.el;
                el.addEventListener('click', function () {
                    var urlDestino = el.getAttribute('data-url');
                    if (urlDestino) {
                        console.log("Enrutando de forma segura hacia:", urlDestino);
                        window.open(urlDestino, '_blank');
                    }
                });
            }
        });
    </script>
</head>
<body>

    <div id="pantalla-bloqueo">
        <h1 style="letter-spacing: 3px; font-size: 2.2rem; margin-bottom: 5px; font-family: 'Orbitron';">LEVEL – i</h1>
        <p style="color: #00f2fe; letter-spacing: 2px; margin-bottom: 40px; font-size: 0.85rem; font-weight: 600;">ORBITAL OFFICE CLIENT EXPERIENCE by Level.immo</p>
        <button class="btn-entrar" onclick="solicitarPermisosYEntrar()">
            Entrar en la Experiencia VR
        </button>
        <a class="btn-privacidad-html" href="https://level.immo/politica-de-privacidad/" target="_blank">Política de Privacidad</a>
    </div>

    <a-scene loading-screen="enabled: false">
        
        <a-assets>
            <video id="video-tiktok" src="https://level-i.github.io/level-intro.mp4" loop muted playsinline crossorigin="anonymous"></video>
            <img id="thumb-rapita" src="https://img.youtube.com/vi/oTGUy0fR9i4/0.jpg" crossorigin="anonymous">
            <img id="thumb-campana" src="https://img.youtube.com/vi/9TTqR1wD3jI/0.jpg" crossorigin="anonymous">
            <img id="thumb-oasis" src="https://img.youtube.com/vi/NXjj-4OXNmQ/0.jpg" crossorigin="anonymous">
        </a-assets>

        <a-sky color="#020617"></a-sky>
        <a-stars radius="200" depth="50" count="1500" factor="4" speed="1"></a-stars>
        <a-ring color="#00f2fe" radius-inner="14" radius-outer="14.1" position="0 0 0" rotation="90 0 0" material="opacity: 0.2;"></a-ring>
        <a-grid material="color: #00f2fe; opacity: 0.05;" rotation="90 0 0" position="0 -0.05 0"></a-grid>

        <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
        <a-light type="directional" color="#00f2fe" intensity="0.5" position="-1 3 1"></a-light>

        <a-entity id="contenedor-camara" camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true;" position="0 1.6 0">
        </a-entity>

        <a-entity position="0 1.5 -2.3">
            <a-entity id="holograma-susana" position="-0.45 0 0">
                <a-cylinder color="#00f2fe" radius="0.08" height="0.6" position="0 -0.2 0" material="opacity: 0.5; transparent: true; wireframe: true;"></a-cylinder>
                <a-cone color="#00f2fe" radius-bottom="0.16" radius-top="0.08" height="0.5" position="0 0.3 0" material="opacity: 0.4; transparent: true; wireframe: true;"></a-cone>
                <a-box color="#00f2fe" width="0.32" height="0.1" depth="0.1" position="0 0.5 0" material="opacity: 0.5; transparent: true; wireframe: true;"></a-box>
                <a-sphere color="#00f2fe" radius="0.08" position="0 0.68 0" material="opacity: 0.6; transparent: true; wireframe: true;"></a-sphere>
                <a-ring color="#ff007f" radius-inner="0.09" radius-outer="0.1" position="0 0.68 0" rotation="0 90 0" material="opacity: 0.9; shader: flat;"></a-ring>
                <a-cylinder color="#ff007f" radius="0.006" height="0.07" position="0.06 0.62 0.06" rotation="45 45 0" material="shader: flat;"></a-cylinder>
                <a-cylinder color="#00f2fe" radius="0.25" height="0.02" position="0 -0.55 0" material="opacity: 0.3; transparent: true;"></a-cylinder>
            </a-entity>

            <a-text value="SUSANA ADVISOR" align="center" position="0 1.1 0" scale="0.9 0.9 0.9" font="exo2bold" color="#00f2fe"></a-text>
            <a-text id="texto-estado-vr" value="IA READY" align="center" position="0 0.85 0" scale="0.6 0.6 0.6" font="monoid" color="#fff"></a-text>

            <a-video src
