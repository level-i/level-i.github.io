<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>level.immo | Computación Espacial</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Helvetica Neue', sans-serif; }
        
        /* Capas de formularios (Ocultas por defecto) */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            display: none; justify-content: center; align-items: center; z-index: 999;
        }
        .panel { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #deff9a; width: 400px; color: white; }
        .panel h2 { color: #deff9a; }
        input, select { width: 100%; margin: 10px 0; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }
        
        /* Botones de acción */
        .ui-menu { position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; }
        .btn { padding: 15px 30px; background: rgba(255,255,255,0.05); border: 1px solid #deff9a; color: white; cursor: pointer; text-transform: uppercase; border-radius: 50px; }
    </style>
</head>
<body>

    <div class="ui-menu">
        <button class="btn" onclick="openPanel('form-compra')">Comprar</button>
        <button class="btn" onclick="openPanel('form-vender')">Vender</button>
        <button class="btn" onclick="openPanel('form-advisors')">Advisors</button>
    </div>

    <div id="form-compra" class="overlay">
        <div class="panel">
            <h2>Acceso a Activos</h2>
            <input type="text" id="Nombre" placeholder="Nombre completo">
            <input type="text" id="Telefono" placeholder="Teléfono">
            <button onclick="enviar()">SOLICITAR ACCESO</button>
        </div>
    </div>

    <a-scene>
        <a-sky src="https://polyhaven.com/textures/hdri/sunrise_mediterranean.jpg"></a-sky>
        <a-camera><a-cursor></a-cursor></a-camera>
    </a-scene>

    <script>
        function openPanel(id) { document.getElementById(id).style.display = 'flex'; }
        
        function enviar() {
            const data = {
                Nombre: document.getElementById('Nombre').value,
                Telefono: document.getElementById('Telefono').value
            };
            fetch('https://hook.eu1.make.com/3lfkz9o57xe4yr5twdnrg3523akp8jkv', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(() => alert('Datos enviados'));
        }
    </script>
</body>
</html>
