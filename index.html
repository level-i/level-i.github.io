<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL AI - Orbital Office</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. ENTORNO VIRTUAL: OFICINA EN EL ESPACIO (CÓDIGO PURO) */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #020617;
            /* Fondo de nebulosa espacial generado por código */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 242, 254, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 20% 30%, rgba(79, 70, 229, 0.1) 0%, transparent 50%);
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Efecto de partículas de estrellas flotantes (Código Puro) */
        body::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            background-image: 
                radial-gradient(white 1px, transparent 0),
                radial-gradient(rgba(255,255,255,0.5) 1px, transparent 0);
            background-size: 50px 50px, 100px 100px;
            background-position: 0 0, 25px 25px;
            opacity: 0.15;
            z-index: -1;
        }

        /* Capa de fusión para dar profundidad */
        .capa-espacial {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0;
            background: radial-gradient(circle at center, rgba(0, 242, 254, 0.1) 0%, rgba(2, 6, 23, 0.6) 85%);
            z-index: -1;
        }

        /* 2. DISEÑO ESTRUCTURAL DE PANTALLA CERO */
        #pantalla-cero {
            display: grid;
            grid-template-columns: 320px 1fr 380px;
            gap: 20px;
            padding: 30px;
            height: 90vh;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .columna-izquierda, .columna-derecha {
            display: flex;
            flex-direction: column;
            gap: 25px;
            justify-content: center;
        }

        /* 3. BOTONES CRISTAL DIAMANTE PERFECCIONADOS */
        .btn-diamante {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            clip-path: polygon(8% 0%, 92% 0%, 100% 50%, 92% 100%, 8% 100%, 0% 50%);
        }

        .btn-diamante:hover {
            background: rgba(0, 242, 254, 0.2);
            border-color: #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            transform: scale(1.02);
        }

        /* 4. SILUETA HOLOGRÁFICA (YODA STYLE) */
        .susana-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .holograma-yoda {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.2) 0%, transparent 70%);
            border: 2px dashed rgba(0, 242, 254, 0.3);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: flotarYoda 4s ease-in-out infinite;
            margin-bottom: 25px;
            cursor: pointer;
            box-shadow: inset 0 0 30px rgba(0, 242, 254, 0.1);
        }

        /* Silueta geométrica mística interior (tu flecha holográfica de Yoda) */
        .holograma-yoda::before {
            content: '';
            width: 110px;
            height: 160px;
            background: rgba(0, 242, 254, 0.6);
            clip-path: polygon(50% 0%, 20% 40%, 35% 40%, 15% 100%, 85% 100%, 65% 40%, 80% 40%);
            filter: blur(1px);
            box-shadow: 0 0 25px #00f2fe;
        }

        /* Pulsador visual para advertir activación obligatoria */
        .btn-activar-voz {
            position: absolute;
            background: #00f2fe;
            color: #020617;
            border: none;
            padding: 8px 15px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            border-radius: 20px;
            text-transform: uppercase;
            bottom: -10px;
            box-shadow: 0 0 15px #00f2fe;
            letter-spacing: 1px;
            animation: pulsoBoton 2s infinite;
        }

        #status-text {
            color: #00f2fe;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px #00f2fe;
            margin-top: 15px;
        }

        /* 5. PLAYLIST DE YOUTUBE lateral compacta */
        .panel-videos {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(15, 23, 42, 0.4);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 380px;
            overflow-y: auto;
        }

        iframe {
            width: 100%;
            height: 110px;
            border-radius: 6px;
            border: 1px solid rgba(0, 242, 254, 0.1);
        }

        /* ANIMACIONES */
        @keyframes flotarYoda {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulsoBoton {
            0%, 100% { transform: scale(1); box-shadow: 0 0 15px #00f2fe; }
            50% { transform: scale(1.05); box-shadow: 0 0 25px #00f2fe; }
        }
    </style>
</head>
<body>

    <div class="capa-espacial"></div>

    <div id="pantalla-cero">
        
        <div class="columna-izquierda">
            <div class="btn-diamante" onclick="navegarMódulo(1)">1) Comprar o Invertir</div>
            <div class="btn-diamante" onclick="navegarMódulo(2)">2) Vender Propiedad</div>
            <div class="btn-diamante" onclick="navegarMódulo(3)">3) Hipoteca Pre-Aprobada</div>
            <div class="btn-diamante" onclick="navegarMódulo(4)">4) Trámites Catastro</div>
        </div>

        <div class="susana-area">
            <div class="holograma-yoda" onclick="forzarVozSusana()">
                <button class="btn-activar-voz" id="btn-holo">Activar IA</button>
            </div>
            <h2 style="font-family: 'Orbitron', sans-serif; font-size: 1.4rem; letter-spacing: 2px; margin: 0;">SUSANA ADVISOR</h2>
            <div id="status-text">HAZ CLIC EN EL HOLOGRAMA</div>
        </div>

        <div class="columna-derecha">
            <div class="btn-diamante" onclick="navegarMódulo(5)">5) Ser Advisor Exclusivo</div>
            <div class="btn-diamante" onclick="navegarMódulo(6)">6) Admin / Contratación</div>
            <div class="btn-diamante" onclick="navegarMódulo(7)">7) English Speaker</div>
            <div class="btn-diamante" onclick="navegarMódulo(8)">8) Parle Françoise</div>
            
            <div class="panel-videos">
                <iframe src="https://www.youtube.com/embed/oTGUy0fR9i4" frameborder="0" allowfullscreen></iframe>
                <iframe src="https://www.youtube.com/embed/9TTqR1wD3jI" frameborder="0" allowfullscreen></iframe>
                <iframe src="https://www.youtube.com/embed/WFv2xu42U40" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

    </div>

<script>
    const welcomeMsg = "Hola. Te encuentras en una web profesional de servicios de consultoría inmobiliaria y marketing digital, dirigida por el API colegiado número 4351 de Barcelona. Soy Susana, tu Asistente Advisor con ADN LEVEL AI. Nos alegramos de tu visita. ¿En qué te podemos ayudar?";

    let iaIniciada = false;

    function hablarSusana(texto, callback) {
        window.speechSynthesis.cancel(); // Reseteo total para evitar atascos
        const ssu = new SpeechSynthesisUtterance(texto);
        const voces = window.speechSynthesis.getVoices();
        
        // Selección precisa de voz femenina profesional en español
        let vozFemenina = voces.find(v => v.lang.includes('es') && (v.name.includes('Monica') || v.name.includes('Google') || v.name.includes('Helena')));
        if (vozFemenina) ssu.voice = vozFemenina;
        
        ssu.rate = 0.95;  // Velocidad elegante y profesional
        ssu.pitch = 1.05; // Ajuste de tono
        ssu.onend = callback;
        window.speechSynthesis.speak(ssu);
    }

    // ACCIÓN CRÍTICA: Rompe el bloqueo del navegador al tocar el holograma
    function forzarVozSusana() {
        if (iaIniciada) return; // Evitamos ejecuciones duplicadas
        iaIniciada = true;
        document.getElementById('status-text').innerText = "SUSANA HABLANDO...";
        document.getElementById('btn-holo').style.display = 'none'; // Escondemos el botón de activación
        
        hablarSusana(welcomeMsg, () => {
            document.getElementById('status-text').innerText = "IA READY - SELECCIONA MENÚ";
        });
    }

    function navegarMódulo(id) {
        if (!iaIniciada) {
            // Si hacen clic a un botón sin activar el holograma, forzamos activación primero
            forzarVozSusana();
            return;
        }
        
        console.log("Navegando al módulo: " + id);
        document.getElementById('status-text').innerText = "CARGANDO MÓDULO " + id + "...";
        hablarSusana("Entendido. Accediendo al submódulo número " + id + ". Por favor, espera un momento.");
    }

    // Asegura la carga del sintetizador de voz en Chrome/Edge
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
</script>

</body>
</html>
