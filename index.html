<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL IMMO | Experiencia Inmersiva</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
</head>
<body>
    <a-scene cursor="rayOrigin: mouse">
        <a-assets>
            <img id="fondo" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/city.jpg">
        </a-assets>

        <a-entity environment="preset: contact; groundTexture: walkernoise; skyType: atmosphere; grid: none; activeSky: true; lightPosition: 0 100 0"></a-entity>

        <a-sky color="#002b36"></a-sky>

        <a-entity camera look-controls position="0 1.6 0">
            <a-cursor color="#00d2ff"></a-cursor>
        </a-entity>

        <a-text value="LEVEL.IMMO | COMPUTACION ESPACIAL" align="center" position="0 2.5 -3" scale="1 1 1" color="#00d2ff"></a-text>

        <a-entity position="0 1.5 -3">
            <a-box position="-1.2 0.3 0" width="1" height="0.25" depth="0.05" color="#1a1a1a"><a-text value="COMPRAR" align="center" position="0 0 0.03" scale="0.2 0.2 0.2"></a-text></a-box>
            <a-box position="0 0.3 0" width="1" height="0.25" depth="0.05" color="#1a1a1a"><a-text value="VENDER" align="center" position="0 0 0.03" scale="0.2 0.2 0.2"></a-text></a-box>
            <a-box position="1.2 0.3 0" width="1" height="0.25" depth="0.05" color="#1a1a1a"><a-text value="HIPOTECAS" align="center" position="0 0 0.03" scale="0.2 0.2 0.2"></a-text></a-box>

            <a-box position="-1.2 -0.1 0" width="1" height="0.25" depth="0.05" color="#00d2ff"><a-text value="PISO RAPITA" align="center" position="0 0 0.03" scale="0.2 0.2 0.2"></a-text></a-box>
            <a-box position="0 -0.1 0" width="1" height="0.25" depth="0.05" color="#00d2ff"><a-text value="CHALET" align="center" position="0 0 0.03" scale="0.2 0.2 0.2"></a-text></a-box>
            <a-box position="1.2 -0.1 0" width="1" height="0.25" depth="0.05" color="#00d2ff"><a-text value="L'OASIS" align="center" position="0 0 0.03" scale="0.2 0.2 0.2"></a-text></a-box>
        </a-entity>
    </a-scene>
</body>
</html>
