<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL AI - Pantalla Cero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. CONFIGURACIÓN DEL ENTORNO DE OFICINA VIRTUAL */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #020617;
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Vídeo de fondo corporativo/avatar (tu versión ligera) */
        #video-fondo {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -2;
            filter: brightness(0.3) contrast(1.1); /* Oscurecido para no molestar la vista */
            object-fit: cover;
        }

        /* Capa espacial galáctica por encima del vídeo */
        .capa-espacial {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0, 242, 254, 0.15) 0%, rgba(2, 6, 23, 0.75) 80%);
            z-index: -1;
        }

        /* 2. LAYOUT DE ARQUITECTURA DE LA PANTALLA CERO */
        #pantalla-cero {
            display: grid;
            grid-template-columns: 320px 1fr 380px;
            gap: 20px;
            padding: 30px;
            height: 92vh;
            align-items: center;
        }

        .columna-izquierda, .columna-derecha {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }

        /* 3. BOTONES CRISTAL DIAMANTE PERFECCIONADOS */
        .btn-diamante {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 18px 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            /* Corte estilo diamante preciso */
            clip-path: polygon(8% 0%, 92% 0%, 100% 50%, 92% 100%, 8% 100%, 0% 50%);
        }

        .btn-diamante:hover {
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.25), rgba(0, 242, 254, 0.05));
            border-color: #00f2fe;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.4);
            transform: scale(1.03) translateY(-2px);
        }

        /* 4. SILUETA HOLOGRÁFICA DE SUSANA (ESTILO MAESTRO YODA) */
        .susana-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .holograma-yoda {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.2) 0%, transparent 70%);
            border: 2px dashed rgba(0, 242, 254, 0.4);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: flotarYoda 4s ease-in-out infinite, parpadeoHolo 2.5s infinite;
            margin-bottom: 25px;
            box-shadow: inset 0 0 40px rgba(0, 242, 254, 0.2);
        }

        /* Icono vector de silueta mística en el centro */
        .holograma-yoda::before {
            content: '';
            width: 140px;
            height: 200px;
            background: rgba(0, 242, 254, 0.65);
            /* Forma geométrica abstracta inspirada en una túnica de silueta mística */
            clip-path: polygon(50% 0%, 15% 40%, 30% 40%, 10% 100%, 90% 100%, 70% 40%, 85% 40%);
            filter: blur(1px);
            box-shadow: 0 0 30px #00f2fe;
        }

        /* Línea de escaneo láser del holograma */
        .holograma-yoda::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 4px;
            background: rgba(0, 242, 254, 0.8);
            box-shadow: 0 0 15px #00f2fe;
            animation: escanerLaser 3s linear infinite;
        }

        #status-text {
            color: #00f2fe;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00f2fe;
            margin-top: 15px;
        }

        /* 5. SECCIÓN DE YOUTUBE COMPACTA */
        .panel-videos {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(2, 6, 23, 0.6);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 380px;
            overflow-y: auto;
        }

        iframe {
            width: 100%;
            height: 105px;
            border-radius: 6px;
            border: 1px solid rgba(0, 242, 254, 0.2);
        }

        /* ANIMACIONES */
        @keyframes flotarYoda {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        @keyframes parpadeoHolo {
            0%, 100% { opacity: 0.95; }
            50% { opacity: 0.8; }
        }
        @keyframes escanerLaser {
            0% { top: 10%; }
            50% { top: 90%; }
            100% { top: 10%; }
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="video-fondo">
        <source src="level-intro.mp4" type="video/mp4">
    </video>
    
    <div class="capa-espacial"></div>

    <div id="pantalla-cero">
        
        <div class="columna-izquierda">
            <div class="btn-diamante" onclick="activarYComunicar(1)">1) Comprar o Invertir</div>
            <div class="btn-diamante" onclick="activarYComunicar(2)">2) Vender Propiedad</div>
            <div class="btn-diamante" onclick="activarYComunicar(3)">3) Hipoteca Pre-Aprobada</div>
            <div class="btn-diamante" onclick="activarYComunicar(4)">4) Trámites Catastro</div>
        </div>

        <div class="susana-area">
            <div class="holograma-yoda"></div>
            <h2 style="font-family: 'Orbitron', sans-serif; font-size: 1.5rem; letter-spacing: 2px; margin: 0;">SUSANA ADVISOR</h2>
            <div id="status-text">PULSA PARA INICIAR</div>
        </div>

        <div class="columna-derecha">
            <div class="btn-diamante" onclick="activarYComunicar(5)">5) Ser Advisor Exclusivo</div>
            <div class="btn-diamante" onclick="activarYComunicar(6)">6) Administración</div>
            <div class="btn-diamante" onclick="activarYComunicar(7)">7) English Speaker</div>
            <div class="btn-diamante" onclick="activarYComunicar(8)">8) Parle Françoise</div>
            
            <div class="panel-videos">
                <iframe src="https://www.youtube.com/embed/oTGUy0fR9i4" frameborder="0" allowfullscreen></iframe>
                <iframe src="https://www.youtube.com/embed/9TTqR1wD3jI" frameborder="0" allowfullscreen></iframe>
                <iframe src="https://www.youtube.com/embed/WFv2xu42U40" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

    </div>

<script>
    const welcomeMsg = "Hola. Te encuentras en una web profesional de servicios de consultoría inmobiliaria y marketing digital, dirigida por el API colegiado número 4351 de Barcelona. Soy Susana, tu Asistente Advisor con ADN LEVEL AI. Nos alegramos de tu visita. ¿En qué te podemos ayudar?";

    let sistemaIniciado = false;

    function hablarSusana(texto, callback) {
        window.speechSynthesis.cancel();
        const ssu = new SpeechSynthesisUtterance(texto);
        const voces = window.speechSynthesis.getVoices();
        
        // Buscador refinado de voz femenina en español
        let vozFemenina = voces.find(v => v.lang.includes('es') && (v.name.includes('Monica') || v.name.includes('Google') || v.name.includes('Helena')));
        if (vozFemenina) ssu.voice = vozFemenina;
        
        ssu.rate = 0.95;
        ssu.pitch = 1.05;
        ssu.onend = callback;
        window.speechSynthesis.speak(ssu);
    }

    // ARREGLO CRÍTICO DE AUTOPLAY: Al primer toque del usuario, Susana cobra vida
    document.body.addEventListener('click', () => {
        if (!sistemaIniciado) {
            sistemaIniciado = true;
            document.getElementById('status-text').innerText = "SUSANA HABLANDO...";
            hablarSusana(welcomeMsg, () => {
                document.getElementById('status-text').innerText = "IA READY - SELECCIONA";
            });
        }
    });

    // SISTEMA DE ENRUTAMIENTO GENERAL
    function activarYComunicar(idPantalla) {
        // Nos aseguramos de que el click inicial no interfiera si ya está corriendo
        sistemaIniciado = true;
        console.log("Transición solicitada al módulo: " + idPantalla);
        document.getElementById('status-text').innerText = "MÓDULO " + idPantalla + "...";
        
        if (idPantalla === 2) {
            hablarSusana("Entrando en el módulo de tasación y venta. Abriendo panel de control.");
            // Aquí enlazará con la pantalla 2 que programaremos a continuación
        } else {
            hablarSusana("Entendido. Conectando con el submódulo número " + idPantalla + ". Por favor, aguarda en línea.");
        }
    }

    // Precarga obligatoria de motores de voz
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
</script>

</body>
</html>
