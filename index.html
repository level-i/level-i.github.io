<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL AI - Pantalla Cero</title>
    <style>
        /* 1. ESTÉTICA ESPACIAL Y OFICINA EN LA NUBE */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #020617;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
            background-image: radial-gradient(circle at center, rgba(0, 242, 254, 0.1) 0%, transparent 80%),
                              url('http://googleusercontent.com/image_collection/image_retrieval/12211095272962485632');
            background-size: cover;
            background-position: center;
        }

        /* 2. DISEÑO CRISTAL DIAMANTE (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .btn-diamante {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%); /* Corte diamante */
        }

        .btn-diamante:hover {
            background: rgba(0, 242, 254, 0.3);
            border-color: #00f2fe;
            transform: scale(1.05);
        }

        /* 3. LAYOUT DE PANTALLA CERO */
        #pantalla-cero {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            gap: 20px;
            padding: 20px;
            height: 90vh;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            align-content: center;
        }

        .video-sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            padding-right: 10px;
        }

        iframe {
            width: 100%;
            height: 180px;
            border-radius: 10px;
            border: 1px solid rgba(0, 242, 254, 0.3);
        }

        .susana-avatar {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .susana-img {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 3px solid #00f2fe;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.5);
            margin-bottom: 20px;
            object-fit: cover;
        }

        #status-text {
            color: #00f2fe;
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 10px;
            text-shadow: 0 0 10px #00f2fe;
        }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="pantalla-cero">
        
        <div class="menu-grid">
            <div class="btn-diamante" onclick="navegar(1)">1) Comprar o Invertir</div>
            <div class="btn-diamante" onclick="navegar(2)">2) Vender Propiedad</div>
            <div class="btn-diamante" onclick="navegar(3)">3) Hipoteca Pre-Aprobada</div>
            <div class="btn-diamante" onclick="navegar(4)">4) Trámites Catastro</div>
        </div>

        <div class="susana-avatar">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/1194389574114506983" class="susana-img" alt="Susana Advisor">
            <h2 style="font-family: 'Orbitron', sans-serif;">SUSANA ADVISOR</h2>
            <div id="status-text">ESPERANDO...</div>
        </div>

        <div class="video-sidebar">
            <div class="menu-grid" style="grid-template-columns: 1fr; margin-bottom: 20px;">
                <div class="btn-diamante" onclick="navegar(5)">5) Ser Advisor Exclusivo</div>
                <div class="btn-diamante" onclick="navegar(6)">6) Admin / Contratación</div>
                <div class="btn-diamante" onclick="navegar(7)">7) English Speaker</div>
                <div class="btn-diamante" onclick="navegar(8)">8) Parle Françoise</div>
            </div>
            
            <iframe src="https://www.youtube.com/embed/oTGUy0fR9i4" frameborder="0" allowfullscreen></iframe>
            <iframe src="https://www.youtube.com/embed/9TTqR1wD3jI" frameborder="0" allowfullscreen></iframe>
            <iframe src="https://www.youtube.com/embed/WFv2xu42U40" frameborder="0" allowfullscreen></iframe>
        </div>

    </div>
</div>

<script>
    // --- LÓGICA DEL MOTOR LEVEL AI ---

    const welcomeMsg = "Hola. Te encuentras en una web profesional de servicios de consultoría inmobiliaria y marketing digital, dirigida por el API colegiado número 4351 de Barcelona. Soy Susana, tu Asistente Advisor con ADN LEVEL AI. Nos alegramos de tu visita. ¿En qué te podemos ayudar?";

    // Función de voz de Susana
    function hablarSusana(texto, callback) {
        window.speechSynthesis.cancel();
        const ssu = new SpeechSynthesisUtterance(texto);
        const voces = window.speechSynthesis.getVoices();
        // Intentamos buscar voz femenina profesional
        let vozFemenina = voces.find(v => v.lang.includes('es') && (v.name.includes('Monica') || v.name.includes('Google')));
        if (vozFemenina) ssu.voice = vozFemenina;
        ssu.rate = 0.95;
        ssu.onend = callback;
        window.speechSynthesis.speak(ssu);
    }

    // Al cargar la página, Susana da la bienvenida
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('status-text').innerText = "SUSANA HABLANDO...";
            hablarSusana(welcomeMsg, () => {
                document.getElementById('status-text').innerText = "IA ACTIVA - ELIGE OPCIÓN";
            });
        }, 1000);
    };

    // MOTOR DE NAVEGACIÓN MODULAR
    function navegar(idPantalla) {
        console.log("Cambiando a pantalla script: " + idPantalla);
        document.getElementById('status-text').innerText = "CARGANDO MÓDULO " + idPantalla + "...";
        
        // Aquí es donde el script "cero" llama a los sub-guiones
        // Por ejemplo, si elige 2, lanzamos el flujo de venta que ya teníamos.
        if(idPantalla === 2) {
            // Limpiamos la pantalla cero y cargamos el script de ventas
            cargarScriptVenta();
        } else {
            hablarSusana("Entendido. Accediendo al módulo " + idPantalla + ". Por favor, espera un momento.");
        }
    }

    // EJEMPLO DE CARGA DE SUB-SCRIPT (Módulo 2)
    function cargarScriptVenta() {
        // Esta función borraría el menú actual y pintaría los botones diamante del paso 21, 22...
        // Lo iremos completando pantalla a pantalla como has pedido.
        document.getElementById('pantalla-cero').innerHTML = `
            <div style="grid-column: 1 / 4; text-align: center; padding-top: 100px;">
                <h1>MÓDULO 2: VENDER PROPIEDAD</h1>
                <p>Cargando sub-menús 21 al 29...</p>
                <div class="btn-diamante" style="width: 200px; margin: 20px auto;" onclick="location.reload()">Volver al Inicio</div>
            </div>
        `;
    }
</script>

</body>
</html>
