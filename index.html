<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>level.immo | Escenario Inmersivo 🟢</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
</head>
<body>

    <a-scene shadow="type: pcfsoft">
        
        <a-assets>
            <video id="video-bienvenida" src="TU_VIDEO_AQUI.mp4" autoplay loop="true" playsinline crossorigin="anonymous"></video>
            <img id="mediterraneo" src="https://images.unsplash.com/photo-1506929113670-b43118224e71?auto=format&fit=crop&w=2000&q=80">
        </a-assets>

        <a-sky src="#mediterraneo" rotation="0 -90 0"></a-sky>

        <a-video src="#video-bienvenida" 
                 position="0 1.8 -3" 
                 width="3.2" 
                 height="1.8" 
                 border="0.1 solid #deff9a">
            <a-entity geometry="primitive: plane; width: 3.3; height: 1.9" 
                      material="color: #111" 
                      position="0 0 -0.01"></a-entity>
        </a-video>

        <a-entity position="0 0.5 -2.5">
            
            <a-entity position="-0.8 0 0" 
                      geometry="primitive: plane; width: 0.6; height: 0.2" 
                      material="color: #deff9a"
                      event-set__mouseenter="material.color: #ffffff"
                      event-set__mouseleave="material.color: #deff9a">
                <a-text value="VILLAS" align="center" color="#000" width="2"></a-text>
            </a-entity>

            <a-entity position="0.8 0 0" 
                      geometry="primitive: plane; width: 0.6; height: 0.2" 
                      material="color: #deff9a"
                      event-set__mouseenter="material.color: #ffffff"
                      event-set__mouseleave="material.color: #deff9a">
                <a-text value="VINAROS" align="center" color="#000" width="2"></a-text>
            </a-entity>

        </a-entity>

        <a-camera>
            <a-cursor color="#deff9a" fuse="true" fuse-timeout="1500"></a-cursor>
        </a-camera>

    </a-scene>

</body>
</html>
