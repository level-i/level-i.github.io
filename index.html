<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL AI - Orbital Office 360 VR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>

    <div id="pantalla-bloqueo" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; color: white;">
        <h1 style="letter-spacing: 3px; font-size: 2rem; margin-bottom: 10px; font-weight: 700;">LEVEL AI</h1>
        <p style="color: #00f2fe; letter-spacing: 2px; margin-bottom: 30px; font-size: 0.9rem;">ORBITAL OFFICE CLIENT EXPERIENCE</p>
        <button onclick="arrancarEntornoVR()" style="background: linear-gradient(135deg, #00f2fe, #4f46e5); color: white; border: none; padding: 20px 50px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; box-shadow: 0 0 30px rgba(0,242,254,0.5); text-transform: uppercase; letter-spacing: 1px;">
            Entrar en la Experiencia VR
        </button>
    </div>

    <a-scene style="display: none;" id="escena-vr" embedded="false">
        
        <a-assets>
            <video id="video-tiktok" src="https://level-i.github.io/level-intro.mp4" loop muted playsinline crossorigin="anonymous"></video>
        </a-assets>

        <a-sky color="#020617"></a-sky>
        <a-cylinder radius="50" height="20" material="src: https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=2000&q=80; side: double; opacity: 0.35; brightness: 0.5;" position="0 0 0"></a-cylinder>
        <a-grid material="color: #1e293b; opacity: 0.4; fill: back" rotation="90 0 0" position="0 -0.1 0"></a-grid>

        <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
        <a-light type="directional" color="#00f2fe" intensity="0.8" position="-2 4 2"></a-light>

        <a-entity camera look-controls position="0 1.6 0">
            <a-entity cursor="fuse: false; rayOrigin: mouse;"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025"
                      material="color: #00f2fe; shader: flat"
                      raycaster="objects: .clickable">
            </a-entity>
        </a-entity>

        <a-entity position="0 1.5 -2.5">
            
            <a-entity id="holograma-directiva" position="-0.5 0 0">
                <a-cone color="#00f2fe" radius-bottom="0.25" radius-top="0.05" height="1.4" material="opacity: 0.5; transparent: true; wireframe: true;"></a-cone>
                <a-sphere color="#00f2fe" radius="0.12" position="0 0.82 0" material="opacity: 0.7; transparent: true; wireframe: true;"></a-sphere>
                <a-cylinder color="#00f2fe" radius="0.4" height="0.05" position="0 -0.7 0" material="opacity: 0.2; transparent: true;"></a-cylinder>
                <a-ring color="#00f2fe" radius-inner="0.38" radius-outer="0.4" position="0 -0.69 0" rotation="90 0 0"></a-ring>
            </a-entity>

            <a-text value="SUSANA ADVISOR" align="center" position="0 1.2 0" scale="1 1 1" font="exo2bold" color="#00f2fe"></a-text>
            <a-text id="texto-estado-vr" value="IA READY" align="center" position="0 0.9 0" scale="0.7 0.7 0.7" font="monoid" color="#fff"></a-text>

            <a-video src="#video-tiktok" width="0.9" height="1.6" position="0.7 0.1 0" material="opacity: 0.9; shader: flat; side: double;"></a-video>
            <a-plane color="#ffffff" width="0.94" height="1.64" position="0.7 0.1 -0.01" material="opacity: 0.1; transparent: true;"></a-plane>
        </a-entity>

        <a-entity position="-2.2 1.6 -1.8" rotation="0 40 0">
            <a-text value="MÓDULOS DE NEGOCIO" color="#00f2fe" align="center" position="0 1.1 0" scale="0.6 0.6 0.6" font="exo2bold"></a-text>
            
            <a-plane class="clickable" onclick="navegarMódulo(1)" position="0 0.6 0" width="1.6" height="0.3" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="1) COMPRAR O INVERTIR" align="center" scale="0.45 0.45 0.45" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(2)" position="0 0.1 0" width="1.6" height="0.3" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="2) VENDER PROPIEDAD" align="center" scale="0.45 0.45 0.45" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(3)" position="0 -0.4 0" width="1.6" height="0.3" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="3) HIPOTECA PRE-APROBADA" align="center" scale="0.45 0.45 0.45" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(4)" position="0 -0.9 0" width="1.6" height="0.3" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="4) TRÁMITES CATASTRO" align="center" scale="0.45 0.45 0.45" font="exo2bold" color="#fff"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="2.2 1.6 -1.8" rotation="0 -40 0">
            <a-text value="CONEXIONES CORPORATIVAS" color="#00f2fe" align="center" position="0 1.1 0" scale="0.6 0.6 0.6" font="exo2bold"></a-text>
            
            <a-plane class="clickable" onclick="navegarMódulo(5)" position="0 0.6 0" width="1.6" height="0.3" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="5) SER ADVISOR EXCLUSIVO" align="center" scale="0.45 0.45 0.45" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(6)" position="0 0.1 0" width="1.6" height="0.3" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="6) ADMINISTRACIÓN" align="center" scale="0.45 0.45 0.45" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(7)" position="0 -0.4 0" width="1.6" height="0.3" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="7) ENGLISH SPEAKER" align="center" scale="0.45 0.45 0.45" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(8)" position="0 -0.9 0" width="1.6" height="0.3" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="8) PARLE FRANÇAISE" align="center" scale="0.45 0.45 0.45" font="exo2bold" color="#fff"></a-text>
            </a-plane>
        </a-entity>

    </a-scene>

    <script>
        const welcomeMsg = "Hola. Te encuentras en una web profesional de servicios de consultoría inmobiliaria y marketing digital, dirigida por el API colegiado número 4173 de Barcelona. Soy Susana, tu Asistente Advisor con ADN LEVEL AI. Nos alegramos de tu visita. Dime cómo te puedo ayudar!";

        let iaActiva = false;

        // Configuración nativa del Reconocimiento de Voz (Oído de Susana)
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        recognition.interimResults = false;

        function hablarSusana(texto, callback) {
            window.speechSynthesis.cancel();
            const ssu = new SpeechSynthesisUtterance(texto);
            const voces = window.speechSynthesis.getVoices();
            
            // Selección optimizada de voz corporativa femenina en español
            let vozFemenina = voces.find(v => v.lang.includes('es') && (v.name.includes('Monica') || v.name.includes('Google') || v.name.includes('Helena')));
            if (vozFemenina) ssu.voice = vozFemenina;
            
            ssu.rate = 0.95;  // Ritmo pausado y elegante
            ssu.pitch = 1.05; // Tono estilizado
            
            ssu.onend = () => {
                if (callback) callback();
            };
            window.speechSynthesis.speak(ssu);
        }

        function abrirMicrofonoCliente() {
            document.getElementById('texto-estado-vr').setAttribute('value', 'ESCUCHANDO AL CLIENTE...');
            try {
                recognition.start();
            } catch(e) { console.log("Canal de entrada de micro ya abierto."); }
        }

        // Procesador semántico de las órdenes verbales recibidas por el micro
        recognition.onresult = function(event) {
            const comando = event.results[0][0].transcript.toLowerCase();
            document.getElementById('texto-estado-vr').setAttribute('value', 'PROCESANDO ORDEN...');
            
            if (comando.includes('comprar') || comando.includes('invertir') || comando.includes('uno')) navegarMódulo(1);
            else if (comando.includes('vender') || comando.includes('dos')) navegarMódulo(2);
            else if (comando.includes('hipoteca') || comando.includes('tres')) navegarMódulo(3);
            else if (comando.includes('catastro') || comando.includes('cuatro')) navegarMódulo(4);
            else if (comando.includes('advisor') || comando.includes('cinco')) navegarMódulo(5);
            else if (comando.includes('administración') || comando.includes('administracion') || comando.includes('seis')) navegarMódulo(6);
            else if (comando.includes('english') || comando.includes('siete')) navegarMódulo(7);
            else if (comando.includes('français') || comando.includes('frances') || comando.includes('ocho')) navegarMódulo(8);
            else {
                hablarSusana("Disculpa, no te he entendido. ¿Me repites qué opción deseas?", abrirMicrofonoCliente);
            }
        };

        recognition.onerror = () => {
            document.getElementById('texto-estado-vr').setAttribute('value', 'IA READY - ELIGE');
        };

        // GESTIÓN DE ARRANQUE INMERSIVO EN OCULUS
        function arrancarEntornoVR() {
            document.getElementById('pantalla-bloqueo').style.display = 'none';
            document.getElementById('escena-vr').style.display = 'block';
            
            iaActiva = true;

            // Arranque de tu vídeo de TikTok: Volumen bajado al mínimo sutil (1 de 10)
            const video = document.getElementById('video-tiktok');
            video.muted = false;
            video.volume = 0.1; // Ajustado con precisión al 10%
            video.play();

            // Susana ejecuta la alocución corporativa de bienvenida
            document.getElementById('texto-estado-vr').setAttribute('value', 'SUSANA HABLANDO...');
            hablarSusana(welcomeMsg, abrirMicrofonoCliente);
        }

        function navegarMódulo(id) {
            console.log("Transición espacial confirmada al submódulo: " + id);
            document.getElementById('texto-estado-vr').setAttribute('value', 'CARGANDO MÓDULO ' + id + '...');
            hablarSusana("Entendido. Conectando con el submódulo de negocio número " + id + ". Por favor, procesa las nuevas opciones.");
        }

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
