<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL IMMO | Spatial Hub</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .interactive">
        <a-assets>
            <img id="office" src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000" crossorigin="anonymous">
        </a-assets>
        <a-sky src="#office" rotation="0 -90 0"></a-sky>

        <a-camera position="0 1.6 0">
            <a-cursor color="#00d2ff"></a-cursor>
        </a-camera>

        <a-entity position="0 2.2 -2.5">
            <a-text value="LEVEL.IMMO" align="center" scale="1.5 1.5 1.5" color="#ffffff"></a-text>
            <a-text value="SPATIAL INMOBILIARIA" align="center" position="0 -0.3 0" scale="0.5 0.5 0.5" color="#00d2ff"></a-text>
        </a-entity>

        <a-entity id="avatar-container" position="0 1.2 -2">
            <a-box width="0.8" height="0.6" depth="0.05" material="color: #000; opacity: 0.8; transparent: true">
                <a-text value="IA AGENT\nPREPARANDO..." align="center" scale="0.2 0.2 0.2" color="#D4AF37"></a-text>
            </a-box>
        </a-entity>

        <a-entity position="0 0.6 -2">
            <a-entity position="0 0.3 0">
                <a-box class="interactive" position="-0.9 0 0" width="0.8" height="0.15" depth="0.05" color="#1a1a1a"><a-text value="COMPRAR" align="center" scale="0.15 0.15 0.15"></a-text></a-box>
                <a-box class="interactive" position="0 0 0" width="0.8" height="0.15" depth="0.05" color="#1a1a1a"><a-text value="VENDER" align="center" scale="0.15 0.15 0.15"></a-text></a-box>
                <a-box class="interactive" position="0.9 0 0" width="0.8" height="0.15" depth="0.05" color="#1a1a1a"><a-text value="HIPOTECAS" align="center" scale="0.15 0.15 0.15"></a-text></a-box>
            </a-entity>

            <a-entity position="0 -0.15 0">
                <a-box class="interactive" position="-0.9 0 0" width="0.8" height="0.15" depth="0.05" color="#00d2ff"><a-text value="PISO RAPITA" align="center" scale="0.15 0.15 0.15" color="#000"></a-text></a-box>
                <a-box class="interactive" position="0 0 0" width="0.8" height="0.15" depth="0.05" color="#00d2ff"><a-text value="CHALET MODERNO" align="center" scale="0.15 0.15 0.15" color="#000"></a-text></a-box>
                <a-box class="interactive" position="0.9 0 0" width="0.8" height="0.15" depth="0.05" color="#00d2ff"><a-text value="L'OASIS" align="center" scale="0.15 0.15 0.15" color="#000"></a-text></a-box>
            </a-entity>
        </a-entity>
    </a-scene>
</body>
</html>
