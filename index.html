<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LEVEL-i - Orbital Office 360</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* PANTALLA DE ACCESO PROFESIONAL (FASE CERO) */
        #pantalla-bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #020617; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-family: 'Montserrat', sans-serif; color: white; text-align: center;
            transition: opacity 1s ease;
        }
        .btn-entrar {
            background: linear-gradient(135deg, #00f2fe, #4f46e5); color: white; border: none; 
            padding: 20px 50px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; 
            cursor: pointer; box-shadow: 0 0 30px rgba(0,242,254,0.5); text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 20px;
        }
        .btn-entrar:hover { transform: scale(1.02); }

        /* CORRECCIÓN INTERFAZ: Botón visible por encima del lienzo 3D */
        .btn-desconectar-hub {
            background: transparent; border: 1px solid #334155; color: #94a3b8; 
            padding: 10px 25px; border-radius: 20px; cursor: pointer; 
            font-family: 'Montserrat', sans-serif; font-size: 0.8rem; letter-spacing: 1px;
            transition: background 0.3s;
        }
        .btn-desconectar-hub:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #00f2fe;
        }
        
        .a-canvas {
            position: absolute !important; top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
        }
        .btn-privacidad-html {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: #94a3b8; text-decoration: none; font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem; letter-spacing: 1px; transition: 0.3s; z-index: 10000;
        }
        .btn-privacidad-html:hover { color: #00f2fe; }
    </style>

    <script>
        // REGISTRO INMEDIATO DE COMPONENTES VR
        AFRAME.registerComponent('componente-enlace-vr', {
            init: function () {
                var el = this.el;
                el.addEventListener('click', function () {
                    var urlDestino = el.getAttribute('data-url');
                    if (urlDestino) {
                        window.open(urlDestino, '_blank');
                    }
                });
            }
        });

        // COMPONENTE DINÁMICO DEL ECUALIZADOR PARA SARA
        AFRAME.registerComponent('efecto-ecualizador', {
            tick: function (time, timeDelta) {
                var el = this.el;
                if (window.saraHablando) {
                    var scaleChange = 1 + Math.sin(time * 0.04) * 0.15;
                    el.setAttribute('scale', {x: scaleChange, y: 1, z: scaleChange});
                    el.setAttribute('material', 'opacity', 0.5 + Math.sin(time * 0.02) * 0.2);
                } else {
                    el.setAttribute('scale', {x: 1, y: 1, z: 1});
                    el.setAttribute('material', 'opacity', 0.4);
                }
            }
        });
    </script>
</head>
<body>

        <button class="btn-entrar" onclick="solicitarPermisosYEntrar()">

        </button>

            Desactivar Conexión HUB

        <a class="btn-privacidad-html" href="https://level.immo/politica-de-privacidad/" target="_blank">Política de Privacidad</a>
    </div>

    <script>
        const welcomeMsg = "Hola. Te encuentras en una web profesional de servicios de consultoría inmobiliaria y marketing digital, dirigida por el API colegiado número 4173 de Barcelona. Soy Sara, tu Asistente Advisor con ADN LEVEL AI. Nos alegramos de tu visita. Dime cómo te podemos ayudar.";
        const insisMsg = "Por favor, dime una de las opciones o di palabras clave como comprar o vender.";

        let iaActiva = false;
        let timerInactividad = null;
        window.saraHablando = false;
        
        let leadData = {
            tipoCliente: '',
            nombre: '',
            telefono: '',
            email: '',
            poblacion: '',
            detallesFinales: ''
        };
        let faseFormulario = 0; 

        // Inicialización nativa estable de Web Speech API
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        function hablarSara(texto, callback) {
            clearTimeout(timerInactividad);
            window.speechSynthesis.cancel();
            const ssu = new SpeechSynthesisUtterance(texto);
            const voces = window.speechSynthesis.getVoices();
            let vozFemenina = voces.find(v => v.lang.includes('es') && (v.name.includes('Monica') || v.name.includes('Google') || v.name.includes('Helena')));
            if (vozFemenina) ssu.voice = vozFemenina;
            ssu.rate = 0.95; ssu.pitch = 1.05;
            
            ssu.onstart = () => { window.saraHablando = true; };
            ssu.onend = () => { 
                window.saraHablando = false;
                if (callback) callback(); 
            };
            window.speechSynthesis.speak(ssu);
        }

        function solicitarPermisosYEntrar() {
            const capaBloqueo = document.getElementById('pantalla-bloqueo');
            if (capaBloqueo) capaBloqueo.style.opacity = '0';
            setTimeout(() => { if (capaBloqueo) capaBloqueo.remove(); }, 1000);
            
            iaActiva = true;

            const camaraContainer = document.getElementById('contenedor-camara');
            const nuevoCursor = document.createElement('a-entity');
            nuevoCursor.setAttribute('cursor', 'fuse: false; rayOrigin: mouse;');
            nuevoCursor.setAttribute('position', '0 0 -1');
            nuevoCursor.setAttribute('geometry', 'primitive: ring; radiusInner: 0.015; radiusOuter: 0.022');
            nuevoCursor.setAttribute('material', 'color: #00f2fe; shader: flat');
            nuevoCursor.setAttribute('raycaster', 'objects: .clickable');
            camaraContainer.appendChild(nuevoCursor);

            const video = document.getElementById('video-tiktok');
            video.muted = false; video.volume = 0.1;
            let vPromise = video.play(); if (vPromise !== undefined) { vPromise.catch(e => {}); }

            document.getElementById('texto-estado-vr').setAttribute('value', 'INICIALIZANDO VOZ...');
            setTimeout(() => {
                document.getElementById('texto-estado-vr').setAttribute('value', 'SARA HABLANDO...');
                hablarSara(welcomeMsg, abrirMicrofonoCliente);
            }, 300);
        }

        // TAREA 1 CORREGIDA: Desvanecimiento limpio y redirección sin bloquear el DOM
        function desactivarHubSutil() {
            const hub = document.getElementById('pantalla-bloqueo');
            if(hub) {
                hub.style.opacity = '0';
                setTimeout(() => {
                    window.location.href = "https://level.immo";
                }, 1000);
            } else {
                window.location.href = "https://level.immo";
            }
        }

        function abrirMicrofonoCliente() {
            if (!iaActiva) return;
            clearTimeout(timerInactividad);
            document.getElementById('texto-estado-vr').setAttribute('value', 'ESCUCHANDO AL CLIENTE...');
            timerInactividad = setTimeout(() => { forzarReinicioCanalVoz(); }, 8000);
            try { recognition.start(); } catch(e) {}
        }

        function forzarReinicioCanalVoz() {
            try { recognition.abort(); } catch(e) {}
            if (faseFormulario > 0) {
                abrirMicrofonoCliente();
            } else {
                document.getElementById('texto-estado-vr').setAttribute('value', 'RECONECTANDO IA...');
                hablarSara(insisMsg, abrirMicrofonoCliente);
            }
        }

        // TAREA 3 CORREGIDA: El vídeo se oculta de forma radical usando el contenedor idéntico
        function activarModulo1() {
            document.getElementById('contenedor-video-tiktok').setAttribute('scale', '0 0 0');
            document.getElementById('paleta-principal').setAttribute('scale', '0 0 0');
            document.getElementById('paleta-subintencion').setAttribute('scale', '1 1 1');
            
            document.getElementById('texto-estado-vr').setAttribute('value', 'PERFIL DE COMPRA');
            hablarSara("Entendido. Vamos a gestionar tu perfil de adquisicion. Por favor, indicame en los nuevos paneles si buscas una propiedad para uso propio, o si tu objetivo es invertir para alquiler o reventa.");
        }

        function seleccionarIntencion(tipo) {
            leadData.tipoCliente = tipo;
            document.getElementById('paleta-subintencion').setAttribute('scale', '0 0 0');
            faseFormulario = 1;
            ejecutarFlujoFormulario();
        }

        function ejecutarFlujoFormulario() {
            if (faseFormulario === 1) {
                document.getElementById('texto-estado-vr').setAttribute('value', 'SARA: PREGUNTA NOMBRE');
                hablarSara("Perfecto. Para poder personalizar tu estudio, me puedes facilitar tu nombre?", abrirMicrofonoCliente);
            } else if (faseFormulario === 2) {
                document.getElementById('texto-estado-vr').setAttribute('value', 'SARA: PREGUNTA TELEFONO');
                hablarSara("Gracias. Ahora necesito que me facilites tu numero de contacto completo.", abrirMicrofonoCliente);
            } else if (faseFormulario === 3) {
                document.getElementById('texto-estado-vr').setAttribute('value', 'SARA: PREGUNTA EMAIL');
                hablarSara("Gracias. Por ultimo, indicame tu correo electronico.", abrirMicrofonoCliente);
            } else if (faseFormulario === 4) {
                document.getElementById('paleta-poblaciones').setAttribute('scale', '1 1 1');
                document.getElementById('texto-estado-vr').setAttribute('value', 'SELECCIONE POBLACION');
                hablarSara("Estupendo " + leadData.nombre + ". Indica en los paneles flotantes en que poblacion estas buscando.");
            }
        }

        function seleccionarPoblacion(nombrePoblacion, urlFondo360) {
            leadData.poblacion = nombrePoblacion;
            if(urlFondo360 !== "") {
                document.getElementById('cielo-entorno').setAttribute('src', urlFondo360);
                document.getElementById('cielo-entorno').setAttribute('color', '#ffffff'); 
            }
            document.getElementById('paleta-poblaciones').setAttribute('scale', '0 0 0');
            
            faseFormulario = 5;
            document.getElementById('texto-estado-vr').setAttribute('value', 'SARA: DETALLES FINALES');
            hablarSara("Conectando con " + nombrePoblacion + ". Ahora, dime de viva voz el tipo de propiedad y tu presupuesto estimado.", abrirMicrofonoCliente);
        }

        // TAREA 2 CORREGIDA: Transcripción forzada a texto dentro del entorno A-Frame
        function desplegarPantallaRevisionYRGPD() {
            faseFormulario = 6; 
            document.getElementById('texto-estado-vr').setAttribute('value', 'VALIDACION LEGAL RGPD');
            
            // Forzamos la actualización de atributos de texto plano en los nodos 3D
            document.getElementById('rgpd-linea-intencion').setAttribute('value', "INTENCION: " + leadData.tipoCliente.toUpperCase());
            document.getElementById('rgpd-linea-nombre').setAttribute('value', "CLIENTE: " + leadData.nombre.toUpperCase());
            document.getElementById('rgpd-linea-contacto').setAttribute('value', "TEL: " + leadData.telefono + " | EMAIL: " + leadData.email.toUpperCase());
            document.getElementById('rgpd-linea-localizacion').setAttribute('value', "CIUDAD: " + leadData.poblacion.toUpperCase() + " | NOTAS: " + leadData.detallesFinales.toUpperCase());
            
            // Mostramos el panel interactivo
            document.getElementById('panel-rgpd').setAttribute('scale', '1 1 1');
            
            hablarSara("Hemos procesado tu dictado. Por favor, revisa en el panel central que tus datos son correctos y haz clic en validar para finalizar.");
        }

        function confirmarYDespacharLark() {
            document.getElementById('panel-rgpd').setAttribute('scale', '0 0 0');
            document.getElementById('texto-estado-vr').setAttribute('value', 'DESPACHANDO LEAD...');
            
            console.log("Lead enviado con éxito:", leadData);
            
            hablarSara("Tratamiento de datos autorizado. Volviendo al panel principal.", function() {
                volverAlMenuPrincipal();
            });
        }

        // PROCESADOR DE ENTRADAS ORALES CORREGIDO
        recognition.onresult = function(event) {
            clearTimeout(timerInactividad);
            const comando = event.results[0][0].transcript.trim();
            
            if (faseFormulario > 0) {
                if (faseFormulario === 1) {
                    leadData.nombre = comando;
                    faseFormulario = 2;
                    ejecutarFlujoFormulario();
                } else if (faseFormulario === 2) {
                    leadData.telefono = comando;
                    faseFormulario = 3;
                    ejecutarFlujoFormulario();
                } else if (faseFormulario === 3) {
                    leadData.email = comando.toLowerCase().replace(/ arroba /g, '@').replace(/ punto /g, '.').replace(/\s/g, '');
                    faseFormulario = 4;
                    ejecutarFlujoFormulario();
                } else if (faseFormulario === 5) {
                    leadData.detallesFinales = comando;
                    desplegarPantallaRevisionYRGPD();
                }
                return;
            }

            const comandoMin = comando.toLowerCase();
            if (comandoMin.includes('comprar') || comandoMin.includes('uno') || comandoMin.includes('invertir')) activarModulo1();
            else {
                document.getElementById('texto-estado-vr').setAttribute('value', 'IA READY - ELIGE');
            }
        };

        function volverAlMenuPrincipal() {
            faseFormulario = 0;
            document.getElementById('paleta-subintencion').setAttribute('scale', '0 0 0');
            document.getElementById('paleta-poblaciones').setAttribute('scale', '0 0 0');
            document.getElementById('panel-rgpd').setAttribute('scale', '0 0 0');
            
            document.getElementById('contenedor-video-tiktok').setAttribute('scale', '1 1 1');
            document.getElementById('paleta-principal').setAttribute('scale', '1 1 1');
            
            document.getElementById('cielo-entorno').removeAttribute('src');
            document.getElementById('cielo-entorno').setAttribute('color', '#020617');
            document.getElementById('texto-estado-vr').setAttribute('value', 'IA READY');
        }

        function navegarModuloGeneric(id) {
            document.getElementById('contenedor-video-tiktok').setAttribute('scale', '0 0 0');
            document.getElementById('texto-estado-vr').setAttribute('value', 'CARGANDO MÓDULO ' + id + '...');
            hablarSara("Conectando con el sub modulo numero " + id);
        }

        recognition.onerror = function(event) {
            if (event.error !== 'no-speech') {
                document.getElementById('texto-estado-vr').setAttribute('value', 'IA READY - ELIGE');
            }
        };

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
