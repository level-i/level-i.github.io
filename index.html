<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL IMMO | Centro de Control VR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <a-scene cursor="rayOrigin: mouse">
        
        <a-assets>
            <img id="futuristic-office" src="https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=2000&auto=format&fit=crop" crossorigin="anonymous">
        </a-assets>

        <a-sky src="#futuristic-office" rotation="0 -90 0"></a-sky>

        <a-entity camera look-controls position="0 1.6 0">
            <a-cursor color="#00d2ff"></a-cursor>
        </a-entity>

        <a-text value="LEVEL.IMMO | CENTRO DE CONTROL GLOBAL" align="center" position="0 2.8 -3" scale="0.8 0.8 0.8" color="#00d2ff"></a-text>

        <a-entity position="0 1.5 -3">
            
            <a-box position="-1.2 0.4 0" width="1" height="0.3" depth="0.05" color="#1a1a1a">
                <a-text value="COMPRAR" align="center" position="0 0 0.03" scale="0.25 0.25 0.25" color="#ffffff"></a-text>
            </a-box>
            <a-box position="0 0.4 0" width="1" height="0.3" depth="0.05" color="#1a1a1a">
                <a-text value="VENDER" align="center" position="0 0 0.03" scale="0.25 0.25 0.25" color="#ffffff"></a-text>
            </a-box>
            <a-box position="1.2 0.4 0" width="1" height="0.3" depth="0.05" color="#1a1a1a">
                <a-text value="HIPOTECAS" align="center" position="0 0 0.03" scale="0.25 0.25 0.25" color="#ffffff"></a-text>
            </a-box>

            <a-box position="-1.2 -0.1 0" width="1" height="0.3" depth="0.05" color="#00d2ff"
                   onclick="window.open('https://www.youtube.com/watch?v=oTGUy0fR9i4', '_blank')">
                <a-text value="PISO RAPITA" align="center" position="0 0 0.03" scale="0.25 0.25 0.25" color="#000000"></a-text>
            </a-box>
            <a-box position="0 -0.1 0" width="1" height="0.3" depth="0.05" color="#00d2ff"
                   onclick="window.open('https://www.youtube.com/watch?v=9TTqR1wD3jI', '_blank')">
                <a-text value="CHALET moderno" align="center" position="0 0 0.03" scale="0.25 0.25 0.25" color="#000000"></a-text>
            </a-box>
            <a-box position="1.2 -0.1 0" width="1" height="0.3" depth="0.05" color="#00d2ff"
                   onclick="window.open('https://www.youtube.com/watch?v=WFv2xu42U40', '_blank')">
                <a-text value="L'OASIS" align="center" position="0 0 0.03" scale="0.25 0.25 0.25" color="#000000"></a-text>
            </a-box>
        </a-entity>

        <a-cylinder position="0 -1.5 -50" rotation="90 0 0" radius="0.05" height="100" material="color: #00d2ff; emissive: #00d2ff; emissiveIntensity: 2; opacity: 0.3; transparent: true"></a-cylinder>

    </a-scene>
</body>
</html>
