<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL AI - Pantalla Cero VR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
</head>
<body>

    <div id="pantalla-bloqueo" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; color: white;">
        <h1 style="letter-spacing: 2px; font-size: 2rem; margin-bottom: 30px;">LEVEL AI - ORBITAL OFFICE</h1>
        <button onclick="arrancarEntornoVR()" style="background: #00f2fe; color: #020617; border: none; padding: 20px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 5px; cursor: pointer; box-shadow: 0 0 20px #00f2fe; text-transform: uppercase;">
            Entrar en la Experiencia VR
        </button>
    </div>

    <a-scene style="display: none;" id="escena-vr" embedded="false">
        
        <a-assets>
            <video id="video-espacio" src="https://level-i.github.io/level-intro.mp4" autoplay loop muted playsinline crossorigin="anonymous"></video>
        </a-assets>

        <a-videosphere src="#video-espacio" rotation="0 -90 0" radius="100" material="brightness: 0.4; contrast: 1.1;"></a-videosphere>

        <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
        <a-light type="directional" color="#00f2fe" intensity="0.8" position="-1 2 1"></a-light>

        <a-entity camera look-controls position="0 1.6 0">
            <a-entity cursor="fuse: false; rayOrigin: mouse;"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                      material="color: #00f2fe; shader: flat"
                      raycaster="objects: .clickable">
            </a-entity>
        </a-entity>

        <a-entity position="0 1.6 -3" id="nodo-susana">
            <a-cone color="#00f2fe" radius-bottom="0.4" radius-top="0" height="1.5" material="opacity: 0.6; transparent: true; wireframe: false; shader: flat;" position="0 0.2 0"></a-cone>
            <a-ring color="#00f2fe" radius-inner="0.6" radius-outer="0.65" rotation="90 0 0" position="0 -0.5 0" material="shader: flat;"></a-ring>
            <a-text value="SUSANA ADVISOR" align="center" position="0 1.2 0" scale="1.2 1.2 1.2" font="monoid" color="#00f2fe"></a-text>
            <a-text id="texto-estado-vr" value="IA READY" align="center" position="0 0.9 0" scale="0.8 0.8 0.8" font="monoid" color="#fff"></a-text>
        </a-entity>

        <a-entity position="-2.5 1.6 -2" rotation="0 35 0">
            <a-text value="SERVICIOS MAESTROS" color="#00f2fe" align="center" position="0 1.2 0" scale="0.8 0.8 0.8"></a-text>
            
            <a-plane class="clickable" onclick="seleccionarModulo(1)" position="0 0.7 0" width="1.8" height="0.35" color="#1e293b" material="opacity: 0.8; transparent: true; border: 1px solid #fff" >
                <a-text value="1) COMPRAR O INVERTIR" align="center" scale="0.5 0.5 0.5" color="#fff"></a-text>
            </a-plane>
            
            <a-plane class="clickable" onclick="seleccionarModulo(2)" position="0 0.2 0" width="1.8" height="0.35" color="#1e293b" material="opacity: 0.8; transparent: true;">
                <a-text value="2) VENDER PROPIEDAD" align="center" scale="0.5 0.5 0.5" color="#fff"></a-text>
            </a-plane>
            
            <a-plane class="clickable" onclick="seleccionarModulo(3)" position="0 -0.3 0" width="1.8" height="0.35" color="#1e293b" material="opacity: 0.8; transparent: true;">
                <a-text value="3) HIPOTECA PRE-APROBADA" align="center" scale="0.5 0.5 0.5" color="#fff"></a-text>
            </a-plane>
            
            <a-plane class="clickable" onclick="seleccionarModulo(4)" position="0 -0.8 0" width="1.8" height="0.35" color="#1e293b" material="opacity: 0.8; transparent: true;">
                <a-text value="4) TRAMITES CATASTRO" align="center" scale="0.5 0.5 0.5" color="#fff"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="2.5 1.6 -2" rotation="0 -35 0">
            <a-text value="CONEXIONES GENERALES" color="#00f2fe" align="center" position="0 1.2 0" scale="0.8 0.8 0.8"></a-text>
            
            <a-plane class="clickable" onclick="seleccionarModulo(5)" position="0 0.7 0" width="1.8" height="0.35" color="#1e293b" material="opacity: 0.8; transparent: true;">
                <a-text value="5) SER ADVISOR ZONA" align="center" scale="0.5 0.5 0.5" color="#fff"></a-text>
            </a-plane>
            
            <a-plane class="clickable" onclick="seleccionarModulo(6)" position="0 0.2 0" width="1.8" height="0.35" color="#1e293b" material="opacity: 0.8; transparent: true;">
                <a-text value="6) ADMINISTRACION" align="center" scale="0.5 0.5 0.5" color="#fff"></a-text>
            </a-plane>
            
            <a-plane class="clickable" onclick="seleccionarModulo(7)" position="0 -0.3 0" width="1.8" height="0.35" color="#1e293b" material="opacity: 0.8; transparent: true;">
                <a-text value="7) ENGLISH SPEAKER" align="center" scale="0.5 0.5 0.5" color="#fff"></a-text>
            </a-plane>
            
            <a-plane class="clickable" onclick="seleccionarModulo(8)" position="0 -0.8 0" width="1.8" height="0.35" color="#1e293b" material="opacity: 0.8; transparent: true;">
                <a-text value="8) PARLE FRANCOISE" align="center" scale="0.5 0.5 0.5" color="#fff"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="0 1.8 3.5" rotation="0 180 0">
            <a-text value="PANELES AUDIOVISUALES INMERSIVOS (MIRA DETRAS TUYO)" color="#00f2fe" align="center" position="0 1.5 0" scale="1 1 1"></a-text>
            
            <a-plane position="-2 0 0" width="1.7" height="1" color="#000" class="clickable" onclick="window.open('https://www.youtube.com/watch?v=oTGUy0fR9i4')">
                <a-text value="LA RAPITA\nPisos 3 Hab\n[Toca para ver]" align="center" scale="0.6 0.6 0.6" position="0 0 0.1"></a-text>
            </a-plane>

            <a-plane position="0 0 0" width="1.7" height="1" color="#000" class="clickable" onclick="window.open('https://www.youtube.com/watch?v=9TTqR1wD3jI')">
                <a-text value="CAMPANA VENTA\nSin Honorarios\n[Toca para ver]" align="center" scale="0.6 0.6 0.6" position="0 0 0.1"></a-text>
            </a-plane>

            <a-plane position="2 0 0" width="1.7" height="1" color="#000" class="clickable" onclick="window.open('https://www.youtube.com/watch?v=WFv2xu42U40')">
                <a-text value="VILLA DE LUXE\nL'Oasis La Rapita\n[Toca para ver]" align="center" scale="0.6 0.6 0.6" position="0 0 0.1"></a-text>
            </a-plane>
        </a-entity>

    </a-scene>

    <script>
        const welcomeMsg = "Hola. Te encuentras en una web profesional de servicios de consultoría inmobiliaria y marketing digital, dirigida por el API colegiado número 4351 de Barcelona. Soy Susana, tu Asistente Advisor con ADN LEVEL AI. Nos alegramos de tu visita. ¿En qué te podemos ayudar?";

        function hablarSusana(texto, callback) {
            window.speechSynthesis.cancel();
            const ssu = new SpeechSynthesisUtterance(texto);
            const voces = window.speechSynthesis.getVoices();
            
            let vozFemenina = voces.find(v => v.lang.includes('es') && (v.name.includes('Monica') || v.name.includes('Google') || v.name.includes('Helena')));
            if (vozFemenina) ssu.voice = vozFemenina;
            
            ssu.rate = 0.95;
            ssu.pitch = 1.05;
            ssu.onend = callback;
            window.speechSynthesis.speak(ssu);
        }

        function arrancarEntornoVR() {
            // Escondemos la pantalla de bloqueo y destapamos el motor espacial
            document.getElementById('pantalla-bloqueo').style.display = 'none';
            document.getElementById('escena-vr').style.display = 'block';
            
            // Forzamos al reproductor 360 a rodar tu vídeo de fondo
            document.getElementById('video-space').play();

            // Susana ejecuta la locución corporativa de forma nativa e inmediata
            document.getElementById('texto-estado-vr').setAttribute('value', 'SUSANA HABLANDO...');
            hablarSusana(welcomeMsg, () => {
                document.getElementById('texto-estado-vr').setAttribute('value', 'IA READY - SELECCIONA');
            });
        }

        function seleccionarModulo(id) {
            console.log("Transición VR ejecutada hacia el flujo: " + id);
            document.getElementById('texto-estado-vr').setAttribute('value', 'MÓDULO ' + id + '...');
            hablarSusana("Accediendo al submódulo espacial número " + id + ". Por favor, procesa la interfaz flotante.");
        }

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
