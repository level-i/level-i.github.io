<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL IMMO | Spatial Hub</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .interactive">
        <a-assets>
            <img id="office" src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000" crossorigin="anonymous">
        </a-assets>
        <a-sky src="#office" rotation="0 -90 0"></a-sky>

        <a-camera position="0 1.6 0"><a-cursor color="#fff"></a-cursor></a-camera>

        <a-text value="LEVEL.IMMO" align="center" position="0 2.2 -2" scale="1.2 1.2 1.2" color="#fff"></a-text>

        <a-entity position="0 1.4 -2" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
            <a-icosahedron radius="0.2" color="#D4AF37"></a-icosahedron>
        </a-entity>

        <a-entity position="0 0.8 -2">
            <a-plane class="interactive" position="-0.7 0 0" width="0.6" height="0.15" color="#fff" opacity="0.1"><a-text value="COMPRAR" align="center" scale="0.2 0.2 0.2" color="#fff"></a-text></a-plane>
            <a-plane class="interactive" position="0 0 0" width="0.6" height="0.15" color="#fff" opacity="0.1"><a-text value="VENDER" align="center" scale="0.2 0.2 0.2" color="#fff"></a-text></a-plane>
            <a-plane class="interactive" position="0.7 0 0" width="0.6" height="0.15" color="#fff" opacity="0.1"><a-text value="HIPOTECAS" align="center" scale="0.2 0.2 0.2" color="#fff"></a-text></a-plane>
        </a-entity>

        <a-entity position="0 0.5 -2">
            <a-plane class="interactive" position="-0.7 0 0" width="0.6" height="0.15" color="#00d2ff" opacity="0.3"><a-text value="PISO" align="center" scale="0.2 0.2 0.2" color="#fff"></a-text></a-plane>
            <a-plane class="interactive" position="0 0 0" width="0.6" height="0.15" color="#00d2ff" opacity="0.3"><a-text value="CHALET" align="center" scale="0.2 0.2 0.2" color="#fff"></a-text></a-plane>
            <a-plane class="interactive" position="0.7 0 0" width="0.6" height="0.15" color="#00d2ff" opacity="0.3"><a-text value="VILLA" align="center" scale="0.2 0.2 0.2" color="#fff"></a-text></a-plane>
        </a-entity>
    </a-scene>
</body>
</html>
