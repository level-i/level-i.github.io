    <style>
        /* ESTILOS BASE Y PANTALLA DE ACCESO */
        body { margin: 0; padding: 0; background-color: #020617; overflow: hidden; }
        #pantalla-bloqueo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); z-index: 999999 !important; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; color: white; text-align: center; transition: opacity 1.2s ease-in-out; }
        .logo-orbital { font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 900; letter-spacing: 5px; margin-bottom: 5px; background: linear-gradient(135deg, #fff, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(0,242,254,0.3); }
        .sub-orbital { color: #00f2fe; letter-spacing: 3px; margin-bottom: 50px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }
        
        .btn-entrar { background: linear-gradient(135deg, #00f2fe, #3b82f6); color: #020617; border: none; padding: 18px 45px; font-size: 1.1rem; font-weight: 800; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(0,242,254,0.4); text-transform: uppercase; letter-spacing: 1.5px; z-index: 1000000; transition: all 0.3s; animation: pulse-glow 2s infinite alternate; }
        .btn-entrar:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 10px 40px rgba(0,242,254,0.8); background: linear-gradient(135deg, #ffffff, #00f2fe); }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 15px rgba(0,242,254,0.4); } 100% { box-shadow: 0 0 35px rgba(0,242,254,0.8); } }
        
        .txt-copyright-inicial { position: absolute; bottom: 55px; left: 50%; transform: translateX(-50%); color: #475569; font-size: 0.7rem; font-weight: 600; letter-spacing: 2px; width: 90%; text-transform: uppercase; }

        /* CAPA DE FUNDIDO FINO (Z-INDEX CORREGIDO A 100000 PARA QUE QUEDE POR DEBAJO DE LA PANTALLA DE INICIO) */
        #capa-fundido-negro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000; z-index: 100000 !important; opacity: 1; pointer-events: none; transition: opacity 1.5s ease-in-out; }
        .a-canvas { position: absolute !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; }

        /* INTERFAZ HÍBRIDA ADVISORS HTML */
        .contenedor-overlay-advisors { position: fixed; top: 5%; left: 50%; transform: translateX(-50%); width: 95%; max-width: 1200px; height: 85vh; background: rgba(2, 6, 23, 0.65); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(0, 242, 254, 0.4); border-radius: 20px; z-index: 200000 !important; display: none; flex-direction: column; font-family: 'Montserrat', sans-serif; color: #f8fafc; padding: 35px; overflow-y: auto; box-shadow: inset 0 0 40px rgba(0, 242, 254, 0.05), 0 20px 50px rgba(0,0,0,0.5); }
        .contenedor-overlay-advisors::-webkit-scrollbar { width: 8px; }
        .contenedor-overlay-advisors::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
        .contenedor-overlay-advisors::-webkit-scrollbar-thumb { background: #00f2fe; border-radius: 4px; }
        
        .pestanas-menu { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid rgba(0, 242, 254, 0.2); padding-bottom: 15px; }
        .tab-btn { background: rgba(15, 23, 42, 0.6); color: #00f2fe; border: 1px solid rgba(0, 242, 254, 0.4); padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; transition: all 0.3s ease; }
        .tab-btn.active, .tab-btn:hover { background: rgba(0, 242, 254, 0.2); color: #fff; border-color: #00f2fe; box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); transform: translateY(-2px); }
        .seccion-contenido-tab { display: none; animation: fadeIn 0.4s ease-in-out; }
        .seccion-contenido-tab.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ESTILOS DEL MENÚ FLOTANTE DE IDIOMAS */
        .selector-idiomas-flotante { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 2px solid #00f2fe; border-radius: 16px; padding: 35px; z-index: 300000 !important; display: none; flex-direction: column; gap: 15px; font-family: 'Montserrat', sans-serif; text-align: center; width: 300px; box-shadow: 0 20px 60px rgba(0, 242, 254, 0.25); }
        .btn-idioma-opc { background: rgba(30, 41, 59, 0.7); color: white; border: 1px solid rgba(0, 242, 254, 0.3); padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-idioma-opc:hover { background: #00f2fe; color: #020617; box-shadow: 0 0 20px rgba(0, 242, 254, 0.6); transform: translateY(-2px); }
        
        /* ESTILOS AÑADIDOS SUITE ADVISORS */
        #level-home-master-suite, #level-home-master-suite * { box-sizing: border-box; font-family: 'Montserrat', sans-serif !important; }
        #level-home-master-suite { background-color: transparent; color: #f8fafc; padding: 1rem 0; width: 100%; margin: 0 auto; }
        .hunt-header, .sim-header { text-align: center; margin-bottom: 3.5rem; }
        .hunt-badge, .sim-badge { background: rgba(0, 242, 254, 0.1); color: #00f2fe; padding: 0.6rem 2rem; border-radius: 50px; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; border: 1px solid rgba(0, 242, 254, 0.4); box-shadow: 0 0 15px rgba(0, 242, 254, 0.15); }
        #level-home-master-suite h2 { font-size: 2.5rem; font-weight: 800; color: #ffffff; margin: 1.5rem 0 1rem 0; text-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }
        #level-home-master-suite h2 span { color: #00f2fe; }
        .hunt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; }
        .profile-box { background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(0, 242, 254, 0.2); border-radius: 16px; padding: 2.5rem; backdrop-filter: blur(10px); transition: transform 0.3s; }
        .profile-box:hover { transform: translateY(-5px); border-color: rgba(0, 242, 254, 0.6); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        .profile-advisor { border-top: 5px solid #00f2fe; }
        .profile-padrino { border-top: 5px solid #fbbf24; }
        .benefits-list { list-style: none; padding: 0; margin-top: 20px; }
        .benefits-list li { margin-bottom: 12px; color: #e2e8f0; line-height: 1.5; font-size: 0.95rem; }
        .btn-home { display: block; text-align: center; padding: 1.2rem; border-radius: 8px; font-weight: 800; text-decoration: none; margin-top: 25px; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-gold { background: #00f2fe; color: #020617; }
        .btn-gold:hover { background: #fff; box-shadow: 0 0 25px rgba(0, 242, 254, 0.8); }
        .btn-outline { border: 2px solid #fbbf24; color: #fbbf24; background: rgba(251, 191, 36, 0.05); }
        .btn-outline:hover { background: #fbbf24; color: #020617; box-shadow: 0 0 25px rgba(251, 191, 36, 0.6); }
        .suite-divider { border: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0, 242, 254, 0.4), transparent); margin: 4rem 0; }
        .sim-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 3rem; }
        .control-card { background: rgba(15, 23, 42, 0.4); padding: 2.5rem; border-radius: 16px; border: 1px solid rgba(0, 242, 254, 0.2); backdrop-filter: blur(10px); }
        .section-divider { font-size: 0.9rem; color: #00f2fe; text-transform: uppercase; border-bottom: 1px solid rgba(0, 242, 254, 0.3); padding-bottom: 0.5rem; margin-top: 20px; margin-bottom: 15px; font-weight: 700; }
        .slider-group { margin-bottom: 20px; }
        .slider-label-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
        .val { color: #00f2fe; font-weight: 800; font-size: 1.1rem; }
        input[type=range] { accent-color: #00f2fe; cursor: pointer; }
        .results-card { background: rgba(2, 6, 23, 0.8); padding: 3rem; border: 1px solid rgba(0, 242, 254, 0.4); border-radius: 16px; text-align: center; box-shadow: inset 0 0 40px rgba(0, 242, 254, 0.08); display: flex; flex-direction: column; justify-content: center; }
        .main-metric .value { font-size: 3.8rem; font-weight: 900; color: #00f2fe; margin: 1.5rem 0; text-shadow: 0 0 25px rgba(0, 242, 254, 0.5); font-family: 'Orbitron', sans-serif; }
        .sub-metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .sub-metric { background: rgba(15, 23, 42, 0.6); padding: 15px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-join-bunker { display: block; background: linear-gradient(135deg, #00f2fe, #3b82f6); color: #020617; padding: 1.2rem; border-radius: 8px; font-weight: 900; text-decoration: none; margin-top: 2.5rem; transition: all 0.3s; letter-spacing: 1.5px; }
        .btn-join-bunker:hover { background: linear-gradient(135deg, #ffffff, #00f2fe); box-shadow: 0 10px 30px rgba(0, 242, 254, 0.6); transform: translateY(-3px); }
        
        @media (max-width: 900px) {
            .hunt-grid, .sim-grid { grid-template-columns: 1fr; }
            .logo-orbital { font-size: 2.2rem; }
            #level-home-master-suite h2 { font-size: 1.8rem; }
        }
    </style>
    <script>
        AFRAME.registerComponent('ondas-voz-sara', {
            tick: function (time, timeDelta) {
                if (window.advisorsVoiceActive) {
                    let s1 = 0.4 + Math.sin(time * 0.05) * 0.4;
                    let s2 = 0.4 + Math.cos(time * 0.03) * 0.4;
                    let s3 = 0.4 + Math.sin(time * 0.07) * 0.4;
                    document.getElementById('barra-audio-1').setAttribute('scale', {x: 1, y: s1, z: 1});
                    document.getElementById('barra-audio-2').setAttribute('scale', {x: 1, y: s2, z: 1});
                    document.getElementById('barra-audio-3').setAttribute('scale', {x: 1, y: s3, z: 1});
                } else {
                    document.getElementById('barra-audio-1').setAttribute('scale', {x: 1, y: 0.1, z: 1});
                    document.getElementById('barra-audio-2').setAttribute('scale', {x: 1, y: 0.1, z: 1});
                    document.getElementById('barra-audio-3').setAttribute('scale', {x: 1, y: 0.1, z: 1});
                }
            }
        });
    </script>

    <script>
        // CONFIGURACIÓN DEL WEBHOOK DE MAKE (Reemplaza la URL por la tuya)
        const MAKE_WEBHOOK_URL_LOGIN = "https://hook.eu1.make.com/XXXXXXXXXX_LOGIN"; 
        const MAKE_WEBHOOK_URL_DATOS = "https://hook.eu1.make.com/XXXXXXXXXX_DATOS"; 

        const welcomeMsg = "Iniciando sistema. Soy tu asistente Advisor Level I. En qué te puedo ayudar?";
        const insisMsg = "Por favor, selecciona una opción del panel de comandos o indica tu objetivo.";
        let iaActiva = false;
        let timerInactividad = null;
        window.advisorsVoiceActive = false;
        let leadData = { tipoCliente: '', nombre: '', nombrePila: '', telefono: '', email: '', poblacion: '', detallesFinales: '', servicioDeseado: '' };
        let faseFormulario = 0; 
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES'; recognition.interimResults = false; recognition.maxAlternatives = 1; recognition.continuous = true; 
        const miniaturasPoblaciones = {
            'Alcanar': 'https://level-i.github.io/docs/alcanar.png', 'Barcelona': 'https://level-i.github.io/docs/barcelona.png', 'Castellar del Valles': 'https://level-i.github.io/docs/castellar.png', 'La Rapita': 'https://level-i.github.io/docs/larapita.png', 'Matadepera': 'https://level-i.github.io/docs/matadepera.png', 'Sabadell': 'https://level-i.github.io/docs/sabadell.png', 'Sant Cugat del Valles': 'https://level-i.github.io/docs/santcugat.png', 'Sant Quirze del Valles': 'https://level-i.github.io/docs/santquirze.png', 'Terrassa': 'https://level-i.github.io/docs/terrassa.png'
        };
        
        function sanearTextoParaAFrame(texto) { if (!texto) return ""; return texto.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim(); }
        
        function actualizarProgresoVisual(porcentaje, estadoTexto) {
            let relleno = document.getElementById('relleno-barra-progreso');
            let txtPorc = document.getElementById('texto-porcentaje-progreso');
            let txtEst = document.getElementById('texto-estado-vr');
            let anchoCalculado = (porcentaje / 100) * 0.88;
            relleno.setAttribute('width', anchoCalculado);
            let posX = -0.44 + (anchoCalculado / 2);
            relleno.setAttribute('position', {x: posX, y: 0, z: 0.01});
            txtPorc.setAttribute('value', porcentaje + "%");
            txtEst.setAttribute('value', estadoTexto.toUpperCase());
        }
        
        function hablarAdvisorUnificado(texto, callback) {
            clearTimeout(timerInactividad); 
            window.speechSynthesis.cancel();
            const ssu = new SpeechSynthesisUtterance(texto);
            const voces = window.speechSynthesis.getVoices();
            let vozAsignada = voces.find(v => v.lang.includes('es') && (v.name.includes('Monica') || v.name.includes('Google') || v.name.includes('Helena')));
            if (vozAsignada) ssu.voice = vozAsignada;
            ssu.rate = 0.95; ssu.pitch = 1.02;
            ssu.onstart = () => { window.advisorsVoiceActive = true; };
            ssu.onend = () => { window.advisorsVoiceActive = false; if (callback) callback(); };
            window.speechSynthesis.speak(ssu);
        }

        // --- LÓGICA DEL GATEKEEPER Y MEMORIA ---
        
        function solicitarAcceso() {
            let usuarioGuardado = localStorage.getItem('levelUserMemoria');
            
            if (usuarioGuardado) {
                let datos = JSON.parse(usuarioGuardado);
                console.log("Bienvenido de nuevo:", datos.nombre);
                iniciarVRDesdeMemoria(datos);
            } else {
                document.getElementById('modal-gatekeeper').style.display = 'flex';
            }
        }

        function cerrarGatekeeper() {
            document.getElementById('modal-gatekeeper').style.display = 'none';
        }

        function procesarLoginGoogle(response) {
            const responsePayload = decodificarJwt(response.credential);
            
            let usuarioTemporal = {
                nombre: responsePayload.name,
                nombrePila: responsePayload.given_name,
                email: responsePayload.email,
                foto: responsePayload.picture,
                ip: "Desconocida",
                fechaRegistro: new Date().toISOString()
            };

            fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(data => {
                    usuarioTemporal.ip = data.ip;
                    completarLogin(usuarioTemporal);
                })
                .catch(err => {
                    console.warn("Fallo al obtener IP, procediendo sin ella.", err);
                    completarLogin(usuarioTemporal);
                });
        }

        function completarLogin(datosUsuario) {
            localStorage.setItem('levelUserMemoria', JSON.stringify(datosUsuario));
            document.getElementById('modal-gatekeeper').style.display = 'none';

            fetch(MAKE_WEBHOOK_URL_LOGIN, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ evento: "Nuevo Login VR", usuario: datosUsuario })
            }).catch(e => console.log("Aviso de login enrutado localmente."));

            iniciarVRDesdeMemoria(datosUsuario);
        }

        function decodificarJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function iniciarVRDesdeMemoria(datosUsuario) {
            const capaBloqueo = document.getElementById('pantalla-bloqueo');
            const capaFundido = document.getElementById('capa-fundido-negro');
            
            if (capaBloqueo) { capaBloqueo.style.opacity = '0'; setTimeout(() => { capaBloqueo.remove(); }, 1200); }
            if (capaFundido) { capaFundido.style.opacity = '0'; }
            
            iaActiva = true;
            
            const videosEsfera = [
                'video-tiktok-src', 'video-derecha-src', 'video-far-right-src', 
                'video-oportunidad-rapita', 'video-izq2-src', 'video-izq3-src', 'video-back-src'
            ];
            
            videosEsfera.forEach(id => {
                let v = document.getElementById(id);
                if(v) { 
                    if(id === 'video-tiktok-src') { v.muted = false; v.volume = 0.1; } else { v.muted = true; }
                    try { v.play(); } catch(e){} 
                }
            });
            
            leadData.nombre = datosUsuario.nombre;
            leadData.nombrePila = datosUsuario.nombrePila;

        function confirmarYDespacharSistema() {
            let num1 = Math.floor(Math.random() * 10) + 1;
            let num2 = Math.floor(Math.random() * 10) + 1;
            let resultadoCorrecto = num1 + num2;
            
            let respuestaUsuario = prompt("🛡️ FIREWALL DE SISTEMA:\nDemuestra que eres humano para enviar los datos de conexión.\n\nResuelve: ¿Cuánto es " + num1 + " + " + num2 + "?");
            
            if (respuestaUsuario === null || respuestaUsuario.trim() === "" || parseInt(respuestaUsuario, 10) !== resultadoCorrecto) {
                alert("❌ ACCESO DENEGADO. Coordenadas matemáticas incorrectas.");
                hablarAdvisorUnificado("Verificación de seguridad fallida. Por favor, vuelve a intentarlo.");
                return; 
            }
            
            document.getElementById('panel-rgpd').setAttribute('scale', '0 0 0');
            actualizarProgresoVisual(100, "TRANSMITIENDO A SERVIDOR...");
            
            let objetoEnvio = {
                operacion: leadData.tipoCliente, 
                nombrePila: leadData.nombrePila, 
                nombreCompleto: leadData.nombre,
                telefono: leadData.telefono, 
                email: leadData.email, 
                zona: leadData.poblacion, 
                descripcion: leadData.detallesFinales,
                servicio: leadData.servicioDeseado, 
                publicarEnZonaMatch: leadData.tipoCliente.includes("Uso Propio") ? true : false,
                urlOrigen: window.location.href,
                fechaEnvio: new Date().toISOString()
            };
            
            console.log("Enviando paquete por túnel seguro...", objetoEnvio);

            fetch(MAKE_WEBHOOK_URL_DATOS, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(objetoEnvio)
            })
            .then(response => {
                if(response.ok) {
                    hablarAdvisorUnificado("Operación exitosa. Paquete de datos transferido al núcleo central. Un especialista contactará contigo en breve.");
                } else {
                    hablarAdvisorUnificado("Aviso del sistema. Hemos guardado los datos localmente debido a una demora en la red.");
                }
            })
            .catch(error => {
                console.error("Error en túnel Make:", error);
                hablarAdvisorUnificado("Señal enrutada por canal alternativo. Nuestro equipo procesará su petición pronto.");
            })
            .finally(() => {
                setTimeout(() => { volverAlMenuPrincipal(); }, 4000);
            });
        }

        function cerrarPanelOverlayAdvisors() { document.getElementById('overlay-advisors').style.display = 'none'; volverAlMenuPrincipal(); }
        function abrirMenuIdiomasFlotante() { try { recognition.abort(); } catch(e){} document.getElementById('overlay-idiomas').style.display = 'flex'; }

        function cambiarFicheroIdioma(nombreArchivo) { window.location.href = "https://level-i.github.io/" + nombreArchivo; }
        
        recognition.onresult = function(event) {
            clearTimeout(timerInactividad); let comando = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) { if (event.results[i].isFinal) comando += event.results[i][0].transcript; }
            comando = comando.trim(); if (comando === "") return;
            const cm = comando.toLowerCase();
            
            if (cm.includes('alquiler') || cm.includes('alquilar')) {
                try { recognition.abort(); } catch(e){}
                document.getElementById('texto-estado-vr').setAttribute('value', 'AVISO: OP RECHAZADA');
                hablarAdvisorUnificado("Nuestra matriz no procesa alquileres, pero puedes usar la consola para ventas, compras o gestiones hipotecarias.", abrirMicrofonoCliente);
                return;
            }
            
            if (faseFormulario > 0) {
                if (faseFormulario === 40) {
                    leadData.poblacion = comando; faseFormulario = 5; hablarAdvisorUnificado("Recibido. Dicta ahora el resto de parámetros operacionales.", abrirMicrofonoCliente);
                } else if (faseFormulario === 6) {
                    leadData.detallesFinales = comando; try { recognition.stop(); } catch(e){} despacharPantallaRevisionYRGPD();
                }
                return;
            }
            if (cm.includes('comprar') || cm.includes('invertir')) activarModulo1();
            else if (cm.includes('vender')) activarModulo2();
            else if (cm.includes('advisor')) abrirModulo5AdvisorsHTML();
            else if (cm.includes('administracion')) activarModulo6Administracion();
            else if (cm.includes('idioma')) abrirMenuIdiomasFlotante();
        };

        // Simulador Híbrido Dashboard
        document.addEventListener('DOMContentLoaded', function() {
            const sAdvisors = document.getElementById('sim-advisors');
            const sTeamSales = document.getElementById('sim-team-sales');
            const sMyCaptures = document.getElementById('sim-my-captures');
            const sMyClosings = document.getElementById('sim-my-closings');
            const sMyNotary = document.getElementById('sim-my-notary');
            const sPrice = document.getElementById('sim-price');
            if(!sAdvisors) return;
            function formatEuro(val) { return new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(val); }
            function runEngine() {
                const advisors = parseInt(sAdvisors.value, 10);
                const salesPer = parseInt(sTeamSales.value, 10);
                const pctCap = parseInt(sMyCaptures.value, 10) / 100;
                const pctClose = parseInt(sMyClosings.value, 10) / 100;
                const pctNotary = parseInt(sMyNotary.value, 10) / 100;
                const price = parseInt(sPrice.value, 10);
                document.getElementById('val-advisors').textContent = advisors;
                document.getElementById('val-team-sales').textContent = salesPer;
                document.getElementById('val-my-captures').textContent = (pctCap * 100) + '%';
                document.getElementById('val-my-closings').textContent = (pctClose * 100) + '%';
                document.getElementById('val-my-notary').textContent = (pctNotary * 100) + '%';
                document.getElementById('val-price').textContent = formatEuro(price);
                const totalOps = advisors * salesPer;
                let fee = Math.max(price * 0.03, 6000);
                let rappelPct = advisors >= 10 ? 0.15 : (advisors >= 5 ? 0.12 : 0.10);
                const rappel = (totalOps * fee) * rappelPct;
                const bonus = (totalOps * pctCap * (fee * 0.20)) + (totalOps * pctClose * (fee * 0.20)) + (totalOps * pctNotary * (fee * 0.10));
                const structure = advisors * 100 * 12;
                document.getElementById('res-net-income').textContent = formatEuro(rappel + bonus - structure);
                document.getElementById('res-rappel-income').textContent = formatEuro(rappel);
                document.getElementById('res-direct-work-income').textContent = formatEuro(bonus);
                document.getElementById('res-structure-cost').textContent = '-' + formatEuro(structure);
                document.getElementById('res-total-operations').textContent = totalOps + ' ops.';
            }
            [sAdvisors, sTeamSales, sMyCaptures, sMyClosings, sMyNotary, sPrice].forEach(el => el.addEventListener('input', runEngine));
            runEngine();
        });
    </script>
