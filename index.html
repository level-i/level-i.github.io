<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL IMMO | Spatial Hub</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <a-scene cursor="rayOrigin: mouse">
        <a-assets>
            <img id="office" src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000" crossorigin="anonymous">
        </a-assets>
        <a-sky src="#office" rotation="0 -90 0"></a-sky>

        <a-camera position="0 1.6 0">
            <a-cursor color="#fff"></a-cursor>
        </a-camera>

        <a-text value="LEVEL.IMMO" align="center" position="0 2.5 -2.5" scale="1 1 1"></a-text>
        <a-text value="SPATIAL INMOBILIARIA" align="center" position="0 2.2 -2.5" scale="0.4 0.4 0.4" color="#00d2ff"></a-text>

        <a-entity position="0 1.3 -2.2">
            <a-text value="IA AGENT" align="center" position="0 0.3 0" scale="0.3 0.3 0.3" color="#00d2ff"></a-text>
            <a-entity geometry="primitive: plane; width: 0.6; height: 0.4" material="color: #00d2ff; wireframe: true" opacity="0.3"></a-entity>
        </a-entity>

        <a-entity position="0 0.6 -2.2">
            <a-box position="-0.7 0.15 0" width="0.6" height="0.12" depth="0.02" color="#fff"><a-text value="COMPRAR" align="center" color="#000" scale="0.15 0.15 0.15"></a-text></a-box>
            <a-box position="0 0.15 0" width="0.6" height="0.12" depth="0.02" color="#fff"><a-text value="VENDER" align="center" color="#000" scale="0.15 0.15 0.15"></a-text></a-box>
            <a-box position="0.7 0.15 0" width="0.6" height="0.12" depth="0.02" color="#fff"><a-text value="HIPOTECAS" align="center" color="#000" scale="0.15 0.15 0.15"></a-text></a-box>

            <a-box position="-0.7 -0.05 0" width="0.6" height="0.12" depth="0.02" color="#00d2ff"><a-text value="PISO" align="center" color="#000" scale="0.15 0.15 0.15"></a-text></a-box>
            <a-box position="0 -0.05 0" width="0.6" height="0.12" depth="0.02" color="#00d2ff"><a-text value="CHALET" align="center" color="#000" scale="0.15 0.15 0.15"></a-text></a-box>
            <a-box position="0.7 -0.05 0" width="0.6" height="0.12" depth="0.02" color="#00d2ff"><a-text value="VILLA" align="center" color="#000" scale="0.15 0.15 0.15"></a-text></a-box>
        </a-entity>
    </a-scene>
</body>
</html>
