<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LEVEL-i  - Orbital Office 360</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* PANTALLA DE ACCESO PROFESIONAL */
        #pantalla-bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #020617; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-family: 'Montserrat', sans-serif; color: white; text-align: center;
        }
        .btn-entrar {
            background: linear-gradient(135deg, #00f2fe, #4f46e5); color: white; border: none; 
            padding: 20px 50px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; 
            cursor: pointer; box-shadow: 0 0 30px rgba(0,242,254,0.5); text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-entrar:hover { transform: scale(1.02); }
        .a-canvas {
            position: absolute !important; top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
        }
        /* BOTÓN PRIVACIDAD HTML (PANTALLA INICIAL) */
        .btn-privacidad-html {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: #94a3b8; text-decoration: none; font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem; letter-spacing: 1px; transition: 0.3s; z-index: 10000;
        }
        .btn-privacidad-html:hover { color: #00f2fe; }
    </style>

    <script>
        // REGISTRO DEL COMPONENTE INTERACTIVO MULTIPLATAFORMA NATIVO DE A-FRAME
        AFRAME.registerComponent('enlace-youtube-vr', {
            init: function () {
                var el = this.el;
                el.addEventListener('click', function () {
                    var urlDestino = el.getAttribute('data-url');
                    if (urlDestino) {
                        console.log("Abriendo enlace inmersivo de YouTube:", urlDestino);
                        window.open(urlDestino, '_blank');
                    }
                });
            }
        });
    </script>
</head>
<body>

    <div id="pantalla-bloqueo">
        <h1 style="letter-spacing: 3px; font-size: 2.2rem; margin-bottom: 5px; font-family: 'Orbitron';">LEVEL – i </h1>
        <p style="color: #00f2fe; letter-spacing: 2px; margin-bottom: 40px; font-size: 0.85rem; font-weight: 600;">ORBITAL OFFICE CLIENT EXPERIENCE by Level.immo</p>
        <button class="btn-entrar" onclick="solicitarPermisosYEntrar()">
            Entrar en la Experiencia VR
        </button>
        <a class="btn-privacidad-html" href="https://level.immo/politica-de-privacidad/" target="_blank">Política de Privacidad</a>
    </div>

    <a-scene style="display: none;" id="escena-vr" embedded="false" loading-screen="enabled: false">
        
        <a-assets>
            <video id="video-tiktok" src="https://level-i.github.io/level-intro.mp4" loop muted playsinline crossorigin="anonymous"></video>
            <img id="thumb-rapita" src="https://i.ytimg.com/vi/oTGUy0fR9i4/maxresdefault.jpg" crossorigin="anonymous">
            <img id="thumb-campana" src="https://i.ytimg.com/vi/9TTqR1wD3jI/maxresdefault.jpg" crossorigin="anonymous">
            <img id="thumb-oasis" src="https://i.ytimg.com/vi/WFv2xu42U40/maxresdefault.jpg" crossorigin="anonymous">
        </a-assets>

        <a-sky color="#020617"></a-sky>
        <a-stars radius="200" depth="50" count="1500" factor="4" speed="1"></a-stars>
        <a-ring color="#00f2fe" radius-inner="14" radius-outer="14.1" position="0 0 0" rotation="90 0 0" material="opacity: 0.2;"></a-ring>
        <a-grid material="color: #00f2fe; opacity: 0.05;" rotation="90 0 0" position="0 -0.05 0"></a-grid>

        <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
        <a-light type="directional" color="#00f2fe" intensity="0.5" position="-1 3 1"></a-light>

        <a-entity camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true;" position="0 1.6 0">
            <a-entity cursor="fuse: false; rayOrigin: mouse;"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.022"
                      material="color: #00f2fe; shader: flat"
                      raycaster="objects: .clickable">
            </a-entity>
        </a-entity>

        <a-entity position="0 1.5 -2.3">
            
            <a-entity id="holograma-susana" position="-0.45 0 0">
                <a-cylinder color="#00f2fe" radius="0.08" height="0.6" position="0 -0.2 0" material="opacity: 0.5; transparent: true; wireframe: true;"></a-cylinder>
                <a-cone color="#00f2fe" radius-bottom="0.16" radius-top="0.08" height="0.5" position="0 0.3 0" material="opacity: 0.4; transparent: true; wireframe: true;"></a-cone>
                <a-box color="#00f2fe" width="0.32" height="0.1" depth="0.1" position="0 0.5 0" material="opacity: 0.5; transparent: true; wireframe: true;"></a-box>
                <a-sphere color="#00f2fe" radius="0.08" position="0 0.68 0" material="opacity: 0.6; transparent: true; wireframe: true;"></a-sphere>
                <a-ring color="#ff007f" radius-inner="0.09" radius-outer="0.1" position="0 0.68 0" rotation="0 90 0" material="opacity: 0.9; shader: flat;"></a-ring>
                <a-cylinder color="#ff007f" radius="0.006" height="0.07" position="0.06 0.62 0.06" rotation="45 45 0" material="shader: flat;"></a-cylinder>
                <a-cylinder color="#00f2fe" radius="0.25" height="0.02" position="0 -0.55 0" material="opacity: 0.3; transparent: true;"></a-cylinder>
            </a-entity>

            <a-text value="SUSANA ADVISOR" align="center" position="0 1.1 0" scale="0.9 0.9 0.9" font="exo2bold" color="#00f2fe"></a-text>
            <a-text id="texto-estado-vr" value="IA READY" align="center" position="0 0.85 0" scale="0.6 0.6 0.6" font="monoid" color="#fff"></a-text>

            <a-video src="#video-tiktok" width="0.8" height="1.4" position="0.6 0.1 0" material="opacity: 0.95; shader: flat; side: double;"></a-video>
            <a-plane color="#ffffff" width="0.84" height="1.44" position="0.6 0.1 -0.01" material="opacity: 0.1; transparent: true;"></a-plane>

            <a-plane class="clickable" position="0 -0.8 0" width="1.2" height="0.15" color="#0f172a" material="opacity: 0.7; transparent: true;" onclick="window.open('https://level.immo/politica-de-privacidad/', '_blank')">
                <a-text value="POLITICA DE PRIVACIDAD (LEGAL)" align="center" scale="0.3 0.3 0.3" font="exo2bold" color="#94a3b8"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="-1.9 1.5 -1.6" rotation="0 35 0">
            <a-plane class="clickable" onclick="navegarMódulo(1)" position="0 0.5 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="1) COMPRAR O INVERTIR" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(2)" position="0 0.05 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="2) VENDER PROPIEDAD" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(3)" position="0 -0.4 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="3) HIPOTECA PRE-APROBADA" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(4)" position="0 -0.85 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="4) TRÁMITES CATASTRO" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="1.9 1.5 -1.6" rotation="0 -35 0">
            <a-plane class="clickable" onclick="navegarMódulo(5)" position="0 0.5 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="5) ADVISOR EXCLUSIVO DE ZONA" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(6)" position="0 0.05 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="6) ADMINISTRACION" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(7)" position="0 -0.4 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="7) ENGLISH SPEAKER" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
            <a-plane class="clickable" onclick="navegarMódulo(8)" position="0 -0.85 0" width="1.4" height="0.25" color="#0f172a" material="opacity: 0.85; transparent: true;">
                <a-text value="8) PARLE FRANÇAISE" align="center" scale="0.38 0.38 0.38" font="exo2bold" color="#fff"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="0 1.6 0" rotation="0 180 0">
            <a-plane class="clickable" enlace-youtube-vr data-url="https://www.youtube.com/watch?v=oTGUy0fR9i4" position="-1.5 0 -3" rotation="0 25 0" width="1.3" height="0.75" src="#thumb-rapita"></a-plane>

            <a-plane class="clickable" enlace-youtube-vr data-url="https://www.youtube.com/watch?v=9TTqR1wD3jI" position="0 0 -3.1" width="1.3" height="0.75" src="#thumb-campana"></a-plane>

            <a-plane class="clickable" enlace-youtube-vr data-url="https://www.youtube.com/watch?v=WFv2xu42U40" position="1.5 0 -3" rotation="0 -25 0" width="1.3" height="0.75" src="#thumb-oasis"></a-plane>
        </a-entity>

    </a-scene>

    <script>
        const welcomeMsg = "Hola. Te encuentras en una web profesional de servicios de consultoría inmobiliaria y marketing digital, dirigida por el API colegiado número 4351 de Barcelona. Soy Susana, tu Asistente Advisor con ADN LEVEL AI. Nos alegramos de tu visita. Dime cómo te podemos ayudar.";
        const insisMsg = "Por favor, dime una de las ocho opciones de los paneles flotantes, o di simplemente una palabra clave como comprar, vender o hipoteca para poder guiarte.";

        let iaActiva = false;
        let timerInactividad = null;

        // Oído de Susana
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        recognition.interimResults = false;

        function hablarSusana(texto, callback) {
            clearTimeout(timerInactividad);
            window.speechSynthesis.cancel();

            const ssu = new SpeechSynthesisUtterance(texto);
            const voces = window.speechSynthesis.getVoices();
            
            let vozFemenina = voces.find(v => v.lang.includes('es') && (v.name.includes('Monica') || v.name.includes('Google') || v.name.includes('Helena')));
            if (vozFemenina) ssu.voice = vozFemenina;
            
            ssu.rate = 0.95; ssu.pitch = 1.05;
            ssu.onend = () => { if (callback) callback(); };
            window.speechSynthesis.speak(ssu);
        }

        function abrirMicrofonoCliente() {
            if (!iaActiva) return;
            
            clearTimeout(timerInactividad);
            document.getElementById('texto-estado-vr').setAttribute('value', 'ESCUCHANDO AL CLIENTE...');

            timerInactividad = setTimeout(() => {
                console.log("Expiración de canal por silencio. Forzando cierre y llamada de voz.");
                forzarReinicioCanalVoz();
            }, 8000);

            try { recognition.start(); } catch(e) {}
        }

        function forzarReinicioCanalVoz() {
            try { recognition.abort(); } catch(e) {} 
            document.getElementById('texto-estado-vr').setAttribute('value', 'RECONECTANDO IA...');
            hablarSusana(insisMsg, abrirMicrofonoCliente);
        }

        recognition.onresult = function(event) {
            clearTimeout(timerInactividad);
            const comando = event.results[0][0].transcript.toLowerCase().trim();
            document.getElementById('texto-estado-vr').setAttribute('value', 'PROCESANDO...');
            
            if (comando.includes('comprar') || comando.includes('uno') || comando.includes('invertir')) navegarMódulo(1);
            else if (comando.includes('vender') || comando.includes('dos') || comando.includes('propiedad')) navegarMódulo(2);
            else if (comando.includes('hipoteca') || comando.includes('tres') || comando.includes('aprobada')) navegarMódulo(3);
            else if (comando.includes('catastro') || comando.includes('cuatro') || comando.includes('trámite')) navegarMódulo(4);
            else if (comando.includes('advisor') || comando.includes('cinco') || comando.includes('ser')) navegarMódulo(5);
            else if (comando.includes('administración') || comando.includes('seis') || comando.includes('contratación')) navegarMódulo(6);
            else if (comando.includes('english') || comando.includes('siete') || comando.includes('speak')) navegarMódulo(7);
            else if (comando.includes('français') || comando.includes('ocho') || comando.includes('parle')) navegarMódulo(8);
            else {
                hablarSusana("Disculpa, no disponemos de esa opción. ¿Me repites cuál de los servicios deseas?", abrirMicrofonoCliente);
            }
        };

        recognition.onerror = function(event) {
            if (event.error !== 'no-speech') {
                clearTimeout(timerInactividad);
                document.getElementById('texto-estado-vr').setAttribute('value', 'IA READY - ELIGE');
            }
        };

        function solicitarPermisosYEntrar() {
            try {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                arrancarEntornoVR();
                            } else {
                                alert("Es necesario habilitar los sensores para usar la oficina 360.");
                            }
                        })
                        .catch(error => {
                            arrancarEntornoVR();
                        });
                } else {
                    arrancarEntornoVR();
                }
            } catch (err) {
                arrancarEntornoVR();
            }
        }

        function arrancarEntornoVR() {
            document.getElementById('pantalla-bloqueo').style.display = 'none';
            document.getElementById('escena-vr').style.display = 'block';
            iaActiva = true;

            const video = document.getElementById('video-tiktok');
            video.muted = false;
            video.volume = 0.1;
            
            let vPromise = video.play();
            if (vPromise !== undefined) {
                vPromise.catch(error => {});
            }

            document.getElementById('texto-estado-vr').setAttribute('value', 'SUSANA HABLANDO...');
            hablarSusana(welcomeMsg, abrirMicrofonoCliente);
        }

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
