<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>level.immo | Estilo Arquitectónico</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        .ui-overlay { position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; z-index: 100; }
        .btn { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 20px 40px; 
            border-radius: 10px; font-family: 'Helvetica Neue', sans-serif; 
            letter-spacing: 3px; cursor: pointer; transition: 0.5s;
        }
        .btn:hover { background: rgba(222, 255, 154, 0.2); border-color: #deff9a; }
        #laser-fx { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; animation: fadeOut 2.5s forwards; }
    </style>
</head>
<body>

    <div id="laser-fx"><div class="laser-line"></div></div>

    <div class="ui-overlay">
        <button class="btn">COMPRAR</button>
        <button class="btn">VENDER</button>
        <button class="btn">HIPOTECA</button>
    </div>

    <a-scene>
        <a-assets>
            <video id="avatar" src="level-intro.mp4" autoplay loop="true" playsinline></video>
            <img id="sky" src="https://polyhaven.com/textures/hdri/sunrise_mediterranean.jpg">
        </a-assets>

        <a-sky src="#sky"></a-sky>

        <a-video src="#avatar" position="0 1.6 -3" width="3" height="1.7" material="shader: flat; transparent: true; opacity: 0.9"></a-video>

        <a-camera><a-cursor color="#deff9a"></a-cursor></a-camera>
    </a-scene>

    <script>
        // Lógica de Audio Fina Filipino
        window.addEventListener('click', () => {
            const audio = new Audio('FindMyWay.mp3'); // Asegúrate de llamar a tu archivo así al subirlo
            audio.volume = 0.5;
            audio.play();
        });
    </script>
</body>
</html>
