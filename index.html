<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL IMMO | Spatial Hub</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
</head>
<body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .interactive">
        <a-assets>
            <img id="office" src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000" crossorigin="anonymous">
        </a-assets>

        <a-sky src="#office" rotation="0 -90 0"></a-sky>

        <a-camera position="0 1.6 0">
            <a-cursor color="#ffffff" opacity="0.5"></a-cursor>
        </a-camera>

        <a-text value="LEVEL.IMMO" align="center" position="0 2.8 -3" scale="1.5 1.5 1.5" color="#ffffff" font="roboto"></a-text>
        <a-text value="SPATIAL INMOBILIARIA" align="center" position="0 2.4 -3" scale="0.6 0.6 0.6" color="#00d2ff" letter-spacing="5"></a-text>

        <a-entity position="0 1.3 -2.5">
            
            <a-entity id="btn-advisors" class="interactive" position="0 0.8 0">
                <a-ring color="#D4AF37" radius-inner="0.45" radius-outer="0.47" animation="property: rotation; to: 0 0 360; dur: 5000; loop: true; easing: linear"></a-ring>
                <a-box width="0.8" height="0.25" depth="0.05" material="color: #433311; metalness: 0.9; roughness: 0.1">
                    <a-text value="ADVISORS" align="center" color="#D4AF37" scale="0.25 0.25 0.25"></a-text>
                </a-box>
            </a-entity>

            <a-entity position="0 0.3 0">
                <a-box class="interactive" position="-0.9 0 0" width="0.8" height="0.2" depth="0.05" material="color: #fff; opacity: 0.2; transparent: true"><a-text value="COMPRAR" align="center" scale="0.2 0.2 0.2"></a-text></a-box>
                <a-box class="interactive" position="0 0 0" width="0.8" height="0.2" depth="0.05" material="color: #fff; opacity: 0.2; transparent: true"><a-text value="VENDER" align="center" scale="0.2 0.2 0.2"></a-text></a-box>
                <a-box class="interactive" position="0.9 0 0" width="0.8" height="0.2" depth="0.05" material="color: #fff; opacity: 0.2; transparent: true"><a-text value="HIPOTECAS" align="center" scale="0.2 0.2 0.2"></a-text></a-box>
            </a-entity>

            <a-entity position="0 -0.1 0">
                <a-box class="interactive" position="-0.9 0 0" width="0.8" height="0.2" depth="0.05" material="color: #00d2ff; opacity: 0.4; transparent: true"><a-text value="PISO RAPITA" align="center" scale="0.2 0.2 0.2"></a-text></a-box>
                <a-box class="interactive" position="0 0 0" width="0.9" height="0.2" depth="0.05" material="color: #00d2ff; opacity: 0.4; transparent: true"><a-text value="CHALET MODERNO" align="center" scale="0.2 0.2 0.2"></a-text></a-box>
                <a-box class="interactive" position="0.9 0 0" width="0.8" height="0.2" depth="0.05" material="color: #00d2ff; opacity: 0.4; transparent: true"><a-text value="L'OASIS" align="center" scale="0.2 0.2 0.2"></a-text></a-box>
            </a-entity>
        </a-entity>
    </a-scene>
</body>
</html>
