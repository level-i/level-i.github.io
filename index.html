<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL IMMO | Spatial Hub 10.0</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .interactive">
        <a-assets>
            <img id="office" src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000" crossorigin="anonymous">
        </a-assets>
        <a-sky src="#office" rotation="0 -90 0"></a-sky>

        <a-camera position="0 1.6 0"><a-cursor color="#fff"></a-cursor></a-camera>

        <a-text value="LEVEL.IMMO" align="center" position="0 2.5 -2" scale="1.2 1.2 1.2" color="#fff" font="exo2bold"></a-text>

        <a-entity position="0 2.1 -2">
            <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
                <a-icosahedron radius="0.15" color="#D4AF37" material="metalness: 0.3; roughness: 0.2"></a-icosahedron>
            </a-entity>
            
            <a-plane class="interactive" position="0 -0.3 0" width="0.5" height="0.12" color="#ffffff" opacity="0.15" transparent="true">
                <a-text value="ADVISORS" align="center" scale="0.25 0.25 0.25" color="#000000" font="exo2bold"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="0 1.4 -2">
            <a-text value="[ ZONA AVATAR IA ]" align="center" scale="0.25 0.25 0.25" color="#40E0D0" opacity="0.4"></a-text>
        </a-entity>

        <a-entity position="0 0.8 -2">
            <a-plane class="interactive" position="-0.7 0 0" width="0.6" height="0.15" color="#000" opacity="0.6"><a-text value="COMPRAR" align="center" scale="0.25 0.25 0.25" color="#fff" font="exo2bold"></a-text></a-plane>
            <a-plane class="interactive" position="0 0 0" width="0.6" height="0.15" color="#000" opacity="0.6"><a-text value="VENDER" align="center" scale="0.25 0.25 0.25" color="#fff" font="exo2bold"></a-text></a-plane>
            <a-plane class="interactive" position="0.7 0 0" width="0.6" height="0.15" color="#000" opacity="0.6"><a-text value="HIPOTECAS" align="center" scale="0.25 0.25 0.25" color="#fff" font="exo2bold"></a-text></a-plane>
        </a-entity>

        <a-entity position="0 0.5 -2">
            <a-plane class="interactive" position="-0.7 0 0" width="0.6" height="0.15" color="#000" opacity="0.6"><a-text value="PISO" align="center" scale="0.25 0.25 0.25" color="#40E0D0" font="exo2bold"></a-text></a-plane>
            <a-plane class="interactive" position="0 0 0" width="0.6" height="0.15" color="#000" opacity="0.6"><a-text value="CHALET" align="center" scale="0.25 0.25 0.25" color="#40E0D0" font="exo2bold"></a-text></a-plane>
            <a-plane class="interactive" position="0.7 0 0" width="0.6" height="0.15" color="#000" opacity="0.6"><a-text value="VILLA" align="center" scale="0.25 0.25 0.25" color="#40E0D0" font="exo2bold"></a-text></a-plane>
        </a-entity>

        <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
    </a-scene>
</body>
</html>
